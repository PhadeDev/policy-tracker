Screens:
  NewsletterPack:
    Properties:
      Fill: =RGBA(244, 246, 243, 1)
      LoadingSpinnerColor: =RGBA(11, 74, 54, 1)
      OnVisible: |-
        =Set(varNewsletterTargetDate, DateAdd(Today(), Mod(5 - Weekday(Today()) + 7, 7), "Days"));
        Refresh('Policy Proof Tracker');
        ClearCollect(
            colNewsletterPack,
            Sort(
                AddColumns(
                    Filter(
                        'Policy Proof Tracker',
                        Year('Planned Publish Date') = Year(varNewsletterTargetDate) &&
                        Month('Planned Publish Date') = Month(varNewsletterTargetDate) &&
                        Day('Planned Publish Date') = Day(varNewsletterTargetDate) &&
                        (
                            ReadyForRelease = true ||
                            'Approved For Release By'.Value = "XO" ||
                            'Approved For Release By'.Value = "ACOS" ||
                            'Approved For Release By'.Value = "DCOMD" ||
                            'Approved For Release By'.Value = "D Commander"
                        ) &&
                        Published = false &&
                        'External consultation required' = false
                    ),
                    SortKey,
                    Coalesce(LookUp(colChoiceColors, ChoiceValue = 'Document Type'.Value, SortOrder), 99),
                    IsFinalApproved,
                    Or(
                        'Approved For Release By'.Value = "XO",
                        'Approved For Release By'.Value = "ACOS",
                        'Approved For Release By'.Value = "DCOMD",
                        'Approved For Release By'.Value = "D Commander"
                    ),
                    PackTitle,
                    Coalesce('Title for Newsletter', Title),
                    PackAudience,
                    Coalesce(Audience, ""),
                    PackSummary,
                    Coalesce('Item summary', "")
                ),
                SortKey,
                SortOrder.Ascending
            )
        )
    Children:
      - conScreen_1:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(244, 246, 243, 1)
            Height: =Parent.Height
            Width: =Parent.Width
          Children:
            - conHeader_1:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =RGBA(223, 229, 224, 1)
                  BorderThickness: =1
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =64
                  RadiusBottomLeft: =14
                  RadiusBottomRight: =14
                  RadiusTopLeft: =14
                  RadiusTopRight: =14
                  Width: =Parent.Width - 48
                  X: =24
                  Y: =20
                Children:
                  - btnBack_1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Color: =RGBA(91, 105, 97, 1)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        HoverColor: =RGBA(91, 105, 97, 1)
                        HoverFill: =RGBA(227, 239, 232, 1)
                        OnSelect: =Navigate(Main, ScreenTransition.Fade)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: ="< Main"
                        Width: =90
                        X: =16
                        Y: =13
                  - lblTitle_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(22, 33, 28, 1)
                        Font: =Font.'Lato Black'
                        Height: =38
                        Size: =16
                        Text: ="Newsletter Pack"
                        Width: =220
                        X: =124
                        Y: =13
                  - lblDate_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(11, 74, 54, 1)
                        Font: =Font.'Courier New'
                        FontWeight: =FontWeight.Bold
                        Height: =30
                        Size: =12
                        Text: ="Thursday " & Text(varNewsletterTargetDate, "d mmmm yyyy")
                        Width: =300
                        X: =352
                        Y: =17
                  - btnRefresh_1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(11, 74, 54, 1)
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =RGBA(11, 74, 54, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        HoverBorderColor: =RGBA(9, 60, 44, 1)
                        HoverFill: =RGBA(9, 60, 44, 1)
                        OnSelect: |-
                          =Set(varNewsletterTargetDate, DateAdd(Today(), Mod(5 - Weekday(Today()) + 7, 7), "Days"));
                          Refresh('Policy Proof Tracker');
                          ClearCollect(
                              colNewsletterPack,
                              Sort(
                                  AddColumns(
                                      Filter(
                                          'Policy Proof Tracker',
                                          Year('Planned Publish Date') = Year(varNewsletterTargetDate) &&
                                          Month('Planned Publish Date') = Month(varNewsletterTargetDate) &&
                                          Day('Planned Publish Date') = Day(varNewsletterTargetDate) &&
                                          (
                                              ReadyForRelease = true ||
                                              'Approved For Release By'.Value = "XO" ||
                                              'Approved For Release By'.Value = "ACOS" ||
                                              'Approved For Release By'.Value = "DCOMD" ||
                                              'Approved For Release By'.Value = "D Commander"
                                          ) &&
                                          Published = false &&
                                          'External consultation required' = false
                                      ),
                                      SortKey,
                                      Coalesce(LookUp(colChoiceColors, ChoiceValue = 'Document Type'.Value, SortOrder), 99),
                                      IsFinalApproved,
                                      Or(
                                          'Approved For Release By'.Value = "XO",
                                          'Approved For Release By'.Value = "ACOS",
                                          'Approved For Release By'.Value = "DCOMD",
                                          'Approved For Release By'.Value = "D Commander"
                                      ),
                                      PackTitle,
                                      Coalesce('Title for Newsletter', Title),
                                      PackAudience,
                                      Coalesce(Audience, ""),
                                      PackSummary,
                                      Coalesce('Item summary', "")
                                  ),
                                  SortKey,
                                  SortOrder.Ascending
                              )
                          )
                        PressedBorderColor: =RGBA(9, 60, 44, 1)
                        PressedFill: =RGBA(9, 60, 44, 1)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: ="Refresh"
                        Width: =100
                        X: =Parent.Width - 124
                        Y: =13
            - conLeftPanel_1:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =RGBA(223, 229, 224, 1)
                  BorderThickness: =1
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =Parent.Height - 116
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  Width: =(Parent.Width - 72) / 2
                  X: =24
                  Y: =96
                Children:
                  - lblPlainHeader_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(22, 33, 28, 1)
                        Font: =Font.'Lato Black'
                        Height: =34
                        Size: =15
                        Text: ="Plain text reference"
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =16
                  - lblPlainCount_1:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(91, 105, 97, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =10
                        Text: =Text(CountRows(colNewsletterPack)) & " items"
                        Width: =120
                        X: =Parent.Width - 140
                        Y: =21
                  - lblPlainEmpty_1:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(91, 105, 97, 1)
                        Font: =Font.'Open Sans'
                        Height: =80
                        Text: ="No matching newsletter items for this Thursday."
                        Visible: =CountRows(colNewsletterPack) = 0
                        Width: =Parent.Width - 80
                        X: =40
                        Y: =Parent.Height / 2 - 40
                  - galPlainPack_1:
                      Control: Gallery@2.15.0
                      Variant: Vertical
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Fill: =RGBA(248, 249, 252, 1)
                        Height: =Parent.Height - 82
                        Items: =colNewsletterPack
                        LoadingSpinner: =LoadingSpinner.None
                        TemplatePadding: =8
                        TemplateSize: =176
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =62
                      Children:
                        - recAccentPlain:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Fill: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode), RGBA(150,150,150,1))
                              Height: =176
                              Width: =4
                        - pillTypePlain:
                            Control: ModernText@1.0.0
                            Properties:
                              Align: =Align.Center
                              AutoHeight: =true
                              BorderColor: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode), RGBA(150,150,150,1))
                              BorderStyle: =BorderStyle.Solid
                              BorderThickness: =1
                              Color: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode), RGBA(150,150,150,1))
                              Fill: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCodeFaded), RGBA(150,150,150,0.1))
                              Font: =Font.Lato
                              FontWeight: =FontWeight.Bold
                              Height: =18
                              PaddingBottom: =2
                              PaddingTop: =2
                              RadiusBottomLeft: =9
                              RadiusBottomRight: =9
                              RadiusTopLeft: =9
                              RadiusTopRight: =9
                              Size: =9
                              Text: =Mid(ThisItem.'Document Type'.Value, Find(" ", ThisItem.'Document Type'.Value) + 1)
                              Width: =110
                              X: =16
                              Y: =8
                        - lblPlainTitle_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(22, 33, 28, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =30
                              Size: =12
                              Text: =ThisItem.PackTitle
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.TemplateWidth - 72
                              X: =16
                              Y: =30
                        - btnCopyTitle_1:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(11, 74, 54, 1)
                              BorderThickness: =1
                              Color: =RGBA(11, 74, 54, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =30
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =RGBA(11, 74, 54, 1)
                              OnSelect: |-
                                =Copy(ThisItem.PackTitle);
                                Notify("Title copied.", NotificationType.Success)
                              PressedFill: =RGBA(9, 60, 44, 1)
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Size: =9
                              Text: ="Copy"
                              Width: =40
                              X: =Parent.TemplateWidth - 56
                              Y: =30
                        - lblPlainAudience_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(91, 105, 97, 1)
                              Font: =Font.'Open Sans'
                              Height: =30
                              Size: =12
                              Text: =ThisItem.PackAudience
                              Width: =Parent.TemplateWidth - 72
                              X: =16
                              Y: =64
                        - btnCopyAudience_1:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(11, 74, 54, 1)
                              BorderThickness: =1
                              Color: =RGBA(11, 74, 54, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =30
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =RGBA(11, 74, 54, 1)
                              OnSelect: |-
                                =Copy(ThisItem.PackAudience);
                                Notify("Audience copied.", NotificationType.Success)
                              PressedFill: =RGBA(9, 60, 44, 1)
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Size: =9
                              Text: ="Copy"
                              Width: =40
                              X: =Parent.TemplateWidth - 56
                              Y: =64
                        - lblPlainSummary_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(91, 105, 97, 1)
                              Font: =Font.'Open Sans'
                              Height: =62
                              Size: =11
                              Text: =ThisItem.PackSummary
                              VerticalAlign: =VerticalAlign.Top
                              Visible: =!IsBlank(ThisItem.PackSummary)
                              Width: =Parent.TemplateWidth - 72
                              X: =16
                              Y: =98
                        - btnCopySummary_1:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(11, 74, 54, 1)
                              BorderThickness: =1
                              Color: =RGBA(11, 74, 54, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =62
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =RGBA(11, 74, 54, 1)
                              OnSelect: |-
                                =Copy(ThisItem.PackSummary);
                                Notify("Summary copied.", NotificationType.Success)
                              PressedFill: =RGBA(9, 60, 44, 1)
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Size: =9
                              Text: ="Copy"
                              Visible: =!IsBlank(ThisItem.PackSummary)
                              Width: =40
                              X: =Parent.TemplateWidth - 56
                              Y: =98
            - conRightPanel_1:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =RGBA(223, 229, 224, 1)
                  BorderThickness: =1
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =Parent.Height - 116
                  RadiusBottomLeft: =10
                  RadiusBottomRight: =10
                  RadiusTopLeft: =10
                  RadiusTopRight: =10
                  Width: =(Parent.Width - 72) / 2
                  X: =48 + ((Parent.Width - 72) / 2)
                  Y: =96
                Children:
                  - lblEmailHeader_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(22, 33, 28, 1)
                        Font: =Font.'Lato Black'
                        Height: =34
                        Size: =15
                        Text: ="Email-ready format"
                        Width: =Parent.Width - 190
                        X: =20
                        Y: =16
                  - btnCopyAll_1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(11, 74, 54, 1)
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        DisplayMode: =If(CountRows(colNewsletterPack) = 0, DisplayMode.Disabled, DisplayMode.Edit)
                        Fill: =RGBA(11, 74, 54, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        HoverBorderColor: =RGBA(9, 60, 44, 1)
                        HoverFill: =RGBA(9, 60, 44, 1)
                        OnSelect: |-
                          =Copy(Concat(colNewsletterPack, "• " & PackTitle & Char(10) & "    ◦ Intended audience: " & PackAudience & Char(10) & Char(10)));
                          Notify("Newsletter pack copied.", NotificationType.Success)
                        PressedBorderColor: =RGBA(9, 60, 44, 1)
                        PressedFill: =RGBA(9, 60, 44, 1)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =10
                        Text: ="Copy All"
                        Width: =120
                        X: =Parent.Width - 140
                        Y: =15
                  - galEmailPreview_1:
                      Control: Gallery@2.15.0
                      Variant: Vertical
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Fill: =RGBA(248, 249, 252, 1)
                        Height: =Parent.Height - 82
                        Items: =colNewsletterPack
                        LoadingSpinner: =LoadingSpinner.None
                        TemplatePadding: =10
                        TemplateSize: =156
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =62
                      Children:
                        - btnRowBg_1:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =If(ThisItem.IsFinalApproved, RGBA(223, 229, 224, 1), RGBA(196, 148, 60, 1))
                              BorderThickness: =1
                              Color: =RGBA(0, 0, 0, 0)
                              DisplayMode: =DisplayMode.View
                              Fill: =If(ThisItem.IsFinalApproved, RGBA(251, 252, 250, 1), RGBA(250, 246, 238, 1))
                              Height: =Parent.TemplateHeight
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =Self.Fill
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =Self.Fill
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Text: =""
                              Width: =Parent.TemplateWidth
                        - lblPreviewTitle_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =If(ThisItem.IsFinalApproved, RGBA(22, 33, 28, 1), RGBA(91, 105, 97, 1))
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =58
                              Text: ="• " & ThisItem.PackTitle
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.TemplateWidth - 44
                              X: =14
                              Y: =10
                        - lblPreviewAudience_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =If(ThisItem.IsFinalApproved, RGBA(91, 105, 97, 1), RGBA(120, 124, 134, 1))
                              Font: =Font.'Open Sans'
                              Height: =50
                              PaddingLeft: =0
                              Size: =12
                              Text: |-
                                ="◦ Intended audience: " & ThisItem.PackAudience
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.TemplateWidth - 74
                              X: =38
                              Y: =72
                        - lblPendingApproval_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(150, 104, 10, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =22
                              Size: =9
                              Text: ="Needs XO / ACOS / DCOMD approval"
                              Visible: =!ThisItem.IsFinalApproved
                              Width: =Parent.TemplateWidth - 34
                              X: =34
                              Y: =126
                  - txtEmailPackHidden_1:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        Default: |-
                          =Concat(colNewsletterPack, "• " & PackTitle & Char(10) & "    ◦ Intended audience: " & PackAudience & Char(10) & Char(10))
                        DisplayMode: =DisplayMode.View
                        Height: =1
                        Mode: =TextMode.MultiLine
                        Visible: =false
                        Width: =1
                  - lblEmailEmpty_2:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(91, 105, 97, 1)
                        Font: =Font.'Open Sans'
                        Height: =80
                        Text: ="No matching newsletter items for this Thursday."
                        Visible: =CountRows(colNewsletterPack) = 0
                        Width: =Parent.Width - 80
                        X: =40
                        Y: =Parent.Height / 2 - 40
