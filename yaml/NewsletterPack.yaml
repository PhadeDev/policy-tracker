Screens:
  NewsletterPack:
    Properties:
      Fill: =RGBA(243, 244, 248, 1)
      LoadingSpinnerColor: =RGBA(46, 125, 89, 1)
      OnVisible: |-
        =Set(varNewsletterTargetDate, DateAdd(Today(), Mod(5 - Weekday(Today()) + 7, 7), "Days"));
        Refresh('Policy Proof Tracker');
        ClearCollect(
            colNewsletterPack,
            Sort(
                AddColumns(
                    Filter(
                        'Policy Proof Tracker',
                        Year('Planned Publish Date') = Year(varNewsletterTargetDate) &&
                        Month('Planned Publish Date') = Month(varNewsletterTargetDate) &&
                        Day('Planned Publish Date') = Day(varNewsletterTargetDate) &&
                        (
                            ReadyForRelease = true ||
                            'Approved For Release By'.Value = "XO" ||
                            'Approved For Release By'.Value = "ACOS" ||
                            'Approved For Release By'.Value = "DCOMD" ||
                            'Approved For Release By'.Value = "D Commander"
                        ) &&
                        Published = false
                    ),
                    SortKey,
                    Switch(
                        'Document Type'.Value,
                        "📄 MoD Policy", 1,
                        "MoD Policy", 1,
                        "📄 ACSO", 2,
                        "ACSO", 2,
                        "📖 Regulation", 3,
                        "Regulation", 3,
                        "📄 CFSO", 4,
                        "CFSO", 4,
                        "📄 CFI", 5,
                        "CFI", 5,
                        "📄 CBN", 6,
                        "CBN", 6,
                        "📕 SOI", 9,
                        "SOI", 9,
                        "📑 Internal Document", 10,
                        "Internal Document", 10,
                        "📗 Manual", 7,
                        "Manual", 7,
                        "📜 Newsletter Item", 8,
                        "Newsletter Item", 8,
                        99
                    ),
                    IsFinalApproved,
                    Or(
                        'Approved For Release By'.Value = "XO",
                        'Approved For Release By'.Value = "ACOS",
                        'Approved For Release By'.Value = "DCOMD",
                        'Approved For Release By'.Value = "D Commander"
                    ),
                    PackTitle,
                    Coalesce('Title for Newsletter', Title),
                    PackAudience,
                    Coalesce(Audience, ""),
                    PackSummary,
                    Coalesce('Item summary', "")
                ),
                SortKey,
                SortOrder.Ascending
            )
        )
    Children:
      - conScreen:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(243, 244, 248, 1)
            Height: =Parent.Height
            Width: =Parent.Width
          Children:
            - conHeader:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  DropShadow: =DropShadow.Semilight
                  Fill: =RGBA(28, 32, 48, 1)
                  Height: =64
                  Width: =Parent.Width
                Children:
                  - lblTitle:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Lato Black'
                        Height: =38
                        Size: =20
                        Text: ="Newsletter Pack"
                        Width: =260
                        X: =24
                        Y: =13
                  - lblDate:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(220, 224, 236, 1)
                        Font: =Font.'Courier New'
                        FontWeight: =FontWeight.Bold
                        Height: =30
                        Size: =12
                        Text: ="Thursday " & Text(varNewsletterTargetDate, "d mmmm yyyy")
                        Width: =360
                        X: =300
                        Y: =17
                  - btnRefresh:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(255, 186, 8, 1)
                        BorderThickness: =1
                        Color: =RGBA(255, 186, 8, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Courier New'
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        HoverBorderColor: =RGBA(255, 210, 80, 1)
                        HoverColor: =RGBA(28, 32, 48, 1)
                        HoverFill: =RGBA(255, 186, 8, 1)
                        OnSelect: |-
                          =Set(varNewsletterTargetDate, DateAdd(Today(), Mod(5 - Weekday(Today()) + 7, 7), "Days"));
                          Refresh('Policy Proof Tracker');
                          ClearCollect(
                              colNewsletterPack,
                              Sort(
                                  AddColumns(
                                      Filter(
                                          'Policy Proof Tracker',
                                          Year('Planned Publish Date') = Year(varNewsletterTargetDate) &&
                                          Month('Planned Publish Date') = Month(varNewsletterTargetDate) &&
                                          Day('Planned Publish Date') = Day(varNewsletterTargetDate) &&
                                          (
                                              ReadyForRelease = true ||
                                              'Approved For Release By'.Value = "XO" ||
                                              'Approved For Release By'.Value = "ACOS" ||
                                              'Approved For Release By'.Value = "DCOMD" ||
                                              'Approved For Release By'.Value = "D Commander"
                                          ) &&
                                          Published = false
                                      ),
                                      SortKey,
                                      Switch(
                                          'Document Type'.Value,
                                          "📄 MoD Policy", 1,
                                          "MoD Policy", 1,
                                          "📄 ACSO", 2,
                                          "ACSO", 2,
                                          "📖 Regulation", 3,
                                          "Regulation", 3,
                                          "📄 CFSO", 4,
                                          "CFSO", 4,
                                          "📄 CFI", 5,
                                          "CFI", 5,
                                          "📄 CBN", 6,
                                          "CBN", 6,
                                          "📕 SOI", 9,
                                          "SOI", 9,
                                          "📑 Internal Document", 10,
                                          "Internal Document", 10,
                                          "📗 Manual", 7,
                                          "Manual", 7,
                                          "📜 Newsletter Item", 8,
                                          "Newsletter Item", 8,
                                          99
                                      ),
                                      IsFinalApproved,
                                      Or(
                                          'Approved For Release By'.Value = "XO",
                                          'Approved For Release By'.Value = "ACOS",
                                          'Approved For Release By'.Value = "DCOMD",
                                          'Approved For Release By'.Value = "D Commander"
                                      ),
                                      PackTitle,
                                      Coalesce('Title for Newsletter', Title),
                                      PackAudience,
                                      Coalesce(Audience, ""),
                                      PackSummary,
                                      Coalesce('Item summary', "")
                                  ),
                                  SortKey,
                                  SortOrder.Ascending
                              )
                          )
                        PressedBorderColor: =RGBA(255, 186, 8, 1)
                        PressedColor: =RGBA(28, 32, 48, 1)
                        PressedFill: =RGBA(230, 165, 0, 1)
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Size: =10
                        Text: ="Refresh"
                        Width: =100
                        X: =Parent.Width - 246
                        Y: =14
                  - btnBack:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(112, 116, 134, 0.6)
                        BorderThickness: =1
                        Color: =RGBA(220, 224, 236, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Courier New'
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        HoverBorderColor: =RGBA(255, 255, 255, 0.8)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(255, 255, 255, 0.08)
                        OnSelect: =Navigate(Main, ScreenTransition.Fade)
                        PressedBorderColor: =RGBA(255, 255, 255, 0.8)
                        PressedColor: =RGBA(255, 255, 255, 1)
                        PressedFill: =RGBA(255, 255, 255, 0.14)
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Size: =10
                        Text: ="Main"
                        Width: =90
                        X: =Parent.Width - 124
                        Y: =14
            - conLeftPanel:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =RGBA(28, 32, 48, 0.12)
                  BorderThickness: =1
                  DropShadow: =DropShadow.Semilight
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =Parent.Height - 92
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =(Parent.Width - 72) / 2
                  X: =24
                  Y: =80
                Children:
                  - lblPlainHeader:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(28, 32, 48, 1)
                        Font: =Font.'Lato Black'
                        Height: =34
                        Size: =16
                        Text: ="Plain text reference"
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =16
                  - lblPlainEmpty:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(112, 116, 134, 1)
                        Font: =Font.'Open Sans'
                        Height: =80
                        Text: ="No matching newsletter items for this Thursday."
                        Visible: =CountRows(colNewsletterPack) = 0
                        Width: =Parent.Width - 80
                        X: =40
                        Y: =Parent.Height / 2 - 40
                  - lblPlainCount:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(112, 116, 134, 1)
                        Font: =Font.'Courier New'
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =10
                        Text: =Text(CountRows(colNewsletterPack)) & " items"
                        Width: =120
                        X: =Parent.Width - 140
                        Y: =21
                  - galPlainPack:
                      Control: Gallery@2.15.0
                      Variant: Vertical
                      Properties:
                        BorderColor: =RGBA(200, 204, 214, 1)
                        BorderThickness: =1
                        Fill: =RGBA(248, 249, 252, 1)
                        Height: =Parent.Height - 82
                        Items: =colNewsletterPack
                        LoadingSpinner: =LoadingSpinner.None
                        TemplatePadding: =8
                        TemplateSize: =210
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =62
                      Children:
                        - pillTitleBG:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderThickness: =0
                              Color: =RGBA(0, 0, 0, 0)
                              DisplayMode: =DisplayMode.View
                              Fill: =RGBA(214, 221, 224, 0.6)
                              Height: =30
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =Self.Fill
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =Self.Fill
                              RadiusBottomLeft: =15
                              RadiusBottomRight: =15
                              RadiusTopLeft: =15
                              RadiusTopRight: =15
                              Text: =""
                              Width: =Parent.TemplateWidth - 55
                              X: =8
                              Y: =8
                        - lblPlainTitle:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(28, 32, 48, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =30
                              Size: =12
                              Text: =ThisItem.PackTitle
                              Width: =Parent.TemplateWidth - 72
                              X: =16
                              Y: =8
                        - btnCopyTitle:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(46, 125, 89, 0.5)
                              BorderThickness: =1
                              Color: =RGBA(46, 125, 89, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Courier New'
                              FontWeight: =FontWeight.Bold
                              Height: =30
                              HoverBorderColor: =RGBA(46, 125, 89, 1)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =RGBA(46, 125, 89, 1)
                              OnSelect: |-
                                =Copy(ThisItem.PackTitle);
                                Notify("Title copied.", NotificationType.Success)
                              PressedBorderColor: =RGBA(28, 80, 55, 1)
                              PressedColor: =RGBA(255, 255, 255, 1)
                              PressedFill: =RGBA(28, 80, 55, 1)
                              Size: =9
                              Text: ="Copy"
                              Width: =40
                              X: =Parent.TemplateWidth - 44
                              Y: =8
                        - pillAudienceBG:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderThickness: =0
                              Color: =RGBA(0, 0, 0, 0)
                              DisplayMode: =DisplayMode.View
                              Fill: =RGBA(214, 221, 224, 0.6)
                              Height: =30
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =Self.Fill
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =Self.Fill
                              RadiusBottomLeft: =15
                              RadiusBottomRight: =15
                              RadiusTopLeft: =15
                              RadiusTopRight: =15
                              Text: =""
                              Width: =Parent.TemplateWidth - 55
                              X: =8
                              Y: =46
                        - lblPlainAudience:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(70, 74, 88, 1)
                              Font: =Font.'Open Sans'
                              Height: =30
                              Size: =12
                              Text: =ThisItem.PackAudience
                              Width: =Parent.TemplateWidth - 72
                              X: =16
                              Y: =46
                        - btnCopyAudience:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(46, 125, 89, 0.5)
                              BorderThickness: =1
                              Color: =RGBA(46, 125, 89, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Courier New'
                              FontWeight: =FontWeight.Bold
                              Height: =30
                              HoverBorderColor: =RGBA(46, 125, 89, 1)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =RGBA(46, 125, 89, 1)
                              OnSelect: |-
                                =Copy(ThisItem.PackAudience);
                                Notify("Audience copied.", NotificationType.Success)
                              PressedBorderColor: =RGBA(28, 80, 55, 1)
                              PressedColor: =RGBA(255, 255, 255, 1)
                              PressedFill: =RGBA(28, 80, 55, 1)
                              Size: =9
                              Text: ="Copy"
                              Width: =40
                              X: =Parent.TemplateWidth - 44
                              Y: =46
                        - pillSummaryBG:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderThickness: =0
                              Color: =RGBA(0, 0, 0, 0)
                              DisplayMode: =DisplayMode.View
                              Fill: =RGBA(214, 221, 224, 0.6)
                              Height: =62
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =Self.Fill
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =Self.Fill
                              Text: =""
                              Visible: =!IsBlank(ThisItem.PackSummary)
                              Width: =Parent.TemplateWidth - 55
                              X: =8
                              Y: =84
                        - lblPlainSummary:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(70, 74, 88, 1)
                              Font: =Font.'Open Sans'
                              Height: =62
                              Size: =11
                              Text: =ThisItem.PackSummary
                              VerticalAlign: =VerticalAlign.Top
                              Visible: =!IsBlank(ThisItem.PackSummary)
                              Width: =Parent.TemplateWidth - 72
                              X: =16
                              Y: =84
                        - btnCopySummary:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(46, 125, 89, 0.5)
                              BorderThickness: =1
                              Color: =RGBA(46, 125, 89, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Courier New'
                              FontWeight: =FontWeight.Bold
                              Height: =62
                              HoverBorderColor: =RGBA(46, 125, 89, 1)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =RGBA(46, 125, 89, 1)
                              OnSelect: |-
                                =Copy(ThisItem.PackSummary);
                                Notify("Summary copied.", NotificationType.Success)
                              PressedBorderColor: =RGBA(28, 80, 55, 1)
                              PressedColor: =RGBA(255, 255, 255, 1)
                              PressedFill: =RGBA(28, 80, 55, 1)
                              Size: =9
                              Text: ="Copy"
                              Visible: =!IsBlank(ThisItem.PackSummary)
                              Width: =40
                              X: =Parent.TemplateWidth - 44
                              Y: =84
            - conRightPanel:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =RGBA(28, 32, 48, 0.12)
                  BorderThickness: =1
                  DropShadow: =DropShadow.Semilight
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =Parent.Height - 92
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =(Parent.Width - 72) / 2
                  X: =48 + ((Parent.Width - 72) / 2)
                  Y: =80
                Children:
                  - lblEmailHeader:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(28, 32, 48, 1)
                        Font: =Font.'Lato Black'
                        Height: =34
                        Size: =16
                        Text: ="Email-ready format"
                        Width: =Parent.Width - 190
                        X: =20
                        Y: =16
                  - btnCopyAll:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(46, 125, 89, 1)
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        DisplayMode: =If(CountRows(colNewsletterPack) = 0, DisplayMode.Disabled, DisplayMode.Edit)
                        Fill: =RGBA(46, 125, 89, 1)
                        Font: =Font.'Courier New'
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        HoverBorderColor: =RGBA(36, 100, 70, 1)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(36, 100, 70, 1)
                        OnSelect: |-
                          =Copy(Concat(colNewsletterPack, "• " & PackTitle & Char(10) & "    ◦ Intended audience: " & PackAudience & Char(10) & Char(10)));
                          Notify("Newsletter pack copied.", NotificationType.Success)
                        PressedBorderColor: =RGBA(28, 80, 55, 1)
                        PressedColor: =RGBA(255, 255, 255, 1)
                        PressedFill: =RGBA(28, 80, 55, 1)
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Size: =10
                        Text: ="Copy All"
                        Width: =120
                        X: =Parent.Width - 140
                        Y: =15
                  - galEmailPreview:
                      Control: Gallery@2.15.0
                      Variant: Vertical
                      Properties:
                        BorderColor: =RGBA(200, 204, 214, 1)
                        BorderThickness: =1
                        Fill: =RGBA(248, 249, 252, 1)
                        Height: =Parent.Height - 82
                        Items: =colNewsletterPack
                        LoadingSpinner: =LoadingSpinner.None
                        TemplatePadding: =10
                        TemplateSize: =156
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =62
                      Children:
                        - btnRowBg:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =If(ThisItem.IsFinalApproved, RGBA(28, 32, 48, 0.08), RGBA(160, 160, 160, 0.4))
                              BorderThickness: =1
                              Color: =RGBA(0, 0, 0, 0)
                              DisplayMode: =DisplayMode.View
                              Fill: =If(ThisItem.IsFinalApproved, RGBA(255, 255, 255, 1), RGBA(238, 239, 242, 1))
                              Height: =Parent.TemplateHeight
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =Self.Fill
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =Self.Fill
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Text: =""
                              Width: =Parent.TemplateWidth
                        - lblPreviewTitle:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =If(ThisItem.IsFinalApproved, RGBA(28, 32, 48, 1), RGBA(95, 98, 108, 1))
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =58
                              Text: ="• " & ThisItem.PackTitle
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.TemplateWidth - 44
                              X: =14
                              Y: =10
                        - lblPreviewAudience:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =If(ThisItem.IsFinalApproved, RGBA(70, 74, 88, 1), RGBA(120, 124, 134, 1))
                              Font: =Font.'Open Sans'
                              Height: =50
                              PaddingLeft: =0
                              Size: =12
                              Text: |-
                                ="◦ Intended audience: " & ThisItem.PackAudience
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.TemplateWidth - 74
                              X: =38
                              Y: =72
                        - lblPendingApproval:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(120, 90, 0, 1)
                              Font: =Font.'Courier New'
                              FontWeight: =FontWeight.Bold
                              Height: =22
                              Size: =9
                              Text: ="Needs XO / ACOS / DCOMD approval"
                              Visible: =!ThisItem.IsFinalApproved
                              Width: =Parent.TemplateWidth - 34
                              X: =34
                              Y: =126
                  - txtEmailPackHidden:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        Default: |-
                          =Concat(colNewsletterPack, "• " & PackTitle & Char(10) & "    ◦ Intended audience: " & PackAudience & Char(10) & Char(10))
                        DisplayMode: =DisplayMode.View
                        Height: =1
                        Mode: =TextMode.MultiLine
                        Visible: =false
                        Width: =1
                  - lblEmailEmpty:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(112, 116, 134, 1)
                        Font: =Font.'Open Sans'
                        Height: =80
                        Text: ="No matching newsletter items for this Thursday."
                        Visible: =CountRows(colNewsletterPack) = 0
                        Width: =Parent.Width - 80
                        X: =40
                        Y: =Parent.Height / 2 - 40
