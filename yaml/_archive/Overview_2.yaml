            PaddingLeft: =24
            PaddingRight: =24
            PaddingTop: =20
            Width: =Parent.Width
          Children:
            - conTopBar3:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =64
                  RadiusBottomLeft: =14
                  RadiusBottomRight: =14
                  RadiusTopLeft: =14
                  RadiusTopRight: =14
                  Width: =Parent.Width
                Children:
                  - btnBackToMain3:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Color: =RGBA(91, 105, 97, 1)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
