                                    VerticalAlign: =VerticalAlign.Top
                                    Width: =Parent.Width - 24
                                    X: =12
                                    Y: =28
                              - imgCardOwner1:
                                  Control: Image@2.2.3
                                  Properties:
                                    Height: =18
                                    Image: =ThisItem.Owner.Picture
                                    RadiusBottomLeft: =9
                                    RadiusBottomRight: =9
                                    RadiusTopLeft: =9
                                    RadiusTopRight: =9
                                    Width: =18
                                    X: =12
                                    Y: =54
                              - lblCardOwner1:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(91, 105, 97, 1)
                                    Font: =Font.'Open Sans'
                                    Height: =18
                                    Size: =8
                                    Text: =ThisItem.Owner.DisplayName
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =Parent.Width - 40
                                    X: =36
                                    Y: =54
                              - btnCardClick1:
                                  Control: Classic/Button@2.2.0
                                  Properties:
                                    BorderThickness: =0
                                    DisplayMode: =DisplayMode.Edit
                                    Fill: =RGBA(0, 0, 0, 0)
                                    Height: =Parent.Height
                                    HoverFill: =RGBA(11, 74, 54, 0.05)
                                    OnSelect: |-
                                      =Set(varOverviewLightboxItem, ThisItem);
                                      ClearCollect(colOverviewLightboxLinks, Filter(PolicyLinks, PolicyTrackerSource.Id = ThisItem.ID));
                                      Set(varOverviewLightboxOpen, true)
                                    PressedFill: =RGBA(11, 74, 54, 0.09)
                                    RadiusBottomLeft: =10
                                    RadiusBottomRight: =10
                                    RadiusTopLeft: =10
                                    RadiusTopRight: =10
                                    Text: =""
                                    Width: =Parent.Width
      - conLightboxScrim1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
