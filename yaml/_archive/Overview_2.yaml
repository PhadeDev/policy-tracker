                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: ="< Main"
                        Width: =90
                        X: =13
                        Y: =13
                  - lblOverviewTitle1:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(22, 33, 28, 1)
                        Font: =Font.'Lato Black'
                        Height: =64
                        Size: =15
                        Text: ="Next 4 Weeks"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =260
                        X: =118
            - galOverviewColumns1:
                Control: Gallery@2.15.0
                Variant: BrowseLayout_Horizontal_TwoTextOneImageVariant_ver5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Items: |-
                    =SortByColumns(
                        GroupBy(
                            Filter(
                                'Policy Proof Tracker',
                                'Planned Publish Date' >= Today() &&
                                'Planned Publish Date' <= Today() + 28
                            ),
                            'Planned Publish Date',
                            ItemsForDate
                        ),
                        "PublishDate",
                        SortOrder.Ascending
                    )
                  TemplateSize: =260
                  Width: =Parent.Width
                Children:
                  - conColHeader1:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        Fill: =If(ThisItem.PublishDate = Date(Year(Today()),Month(Today()),Day(Today())) || (ThisItem.PublishDate >= Today() && ThisItem.PublishDate < DateAdd(Today(), 7, "Days")), RGBA(11, 74, 54, 1), RGBA(231, 236, 232, 1))
                        Height: =40
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                        Width: =Parent.TemplateWidth - 16
                        X: =8
                      Children:
                        - lblColDate1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =If(ThisItem.PublishDate = Date(Year(Today()),Month(Today()),Day(Today())) || (ThisItem.PublishDate >= Today() && ThisItem.PublishDate < DateAdd(Today(), 7, "Days")), RGBA(255,255,255,1), RGBA(58, 69, 62, 1))
