Screens:
  Overview_2:
    Properties:
      Fill: =RGBA(244, 246, 243, 1)
      OnVisible: |-
        =Set(varOverviewLightboxOpen, false);
        Set(varOverviewLightboxItem, Blank());
        Clear(colOverviewLightboxLinks)
