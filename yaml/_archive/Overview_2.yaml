                            Properties:
                              Color: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Lato Black'
                              Height: =36
                              Size: =15
                              Text: =If(IsBlank(varOverviewLightboxItem), "", varOverviewLightboxItem.Title)
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.Width - 70
                              X: =20
                              Y: =32
                        - lblLightboxDate1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(255, 255, 255, 0.8)
                              Font: =Font.'Open Sans'
                              Height: =16
                              Size: =9
