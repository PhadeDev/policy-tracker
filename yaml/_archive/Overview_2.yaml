                              FontWeight: =FontWeight.Bold
                              Height: =Parent.Height
                              Size: =11
                              Text: =Text(ThisItem.PublishDate, "ddd, dd mmm")
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =Parent.Width - 60
                              X: =14
                        - lblColBadge1:
                            Control: ModernText@1.0.0
                            Properties:
                              Align: =Align.Center
                              AutoHeight: =true
                              Color: =If(ThisItem.PublishDate >= Today() && ThisItem.PublishDate < DateAdd(Today(), 7, "Days"), RGBA(11,74,54,1), RGBA(255,255,255,1))
                              Fill: =If(ThisItem.PublishDate >= Today() && ThisItem.PublishDate < DateAdd(Today(), 7, "Days"), RGBA(255,255,255,1), RGBA(11,74,54,1))
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =22
                              RadiusBottomLeft: =11
                              RadiusBottomRight: =11
                              RadiusTopLeft: =11
                              RadiusTopRight: =11
                              Size: =9
                              Text: =Text(CountRows(ThisItem.ItemsForDate))
                              Width: =32
                              X: =Parent.Width - 42
                              Y: =9
