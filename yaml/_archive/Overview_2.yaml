                        BorderThickness: =1
                        Fill: ==RGBA(255, 255, 255, 1)
                        Height: =Parent.TemplateHeight - 40
                        Items: =Sort(ThisItem.ItemsForDate, 'Document Type'.Value, SortOrder.Ascending)
                        TemplateSize: =88
                        Width: =Parent.TemplateWidth - 16
                        X: =8
                        Y: =40
