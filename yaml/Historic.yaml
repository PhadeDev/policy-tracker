Screens:
  Historic:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - conScreen:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 246, 248, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =0
            PaddingBottom: =0
            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            Width: =Parent.Width
          Children:
            - conHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.Semilight
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =68
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingLeft: =14
                  PaddingRight: =14
                Children:
                  - btnBack:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(0, 64, 47, 1)
                        BorderThickness: =1
                        Color: =RGBA(0, 64, 47, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        FillPortions: =0
                        Height: =36
                        HoverBorderColor: =RGBA(0, 64, 47, 1)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(0, 64, 47, 1)
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        OnSelect: =Navigate(Main, ScreenTransition.Fade)
                        PressedBorderColor: =RGBA(0, 64, 47, 1)
                        PressedColor: =RGBA(0, 64, 47, 1)
                        PressedFill: =RGBA(45, 128, 40, 1)
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Text: ="← Back"
                        Width: =88
                  - lblPageTitle:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        FillPortions: =0
                        Font: =Font.'Lato Black'
                        Height: =44
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =20
                        Text: ="Archive"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =130
                  - badgeUnpublished:
                      Control: Badge@0.0.24
                      Properties:
                        Appearance: ='BadgeCanvas.Appearance'.Tint
                        Content: ="Red tint = not yet published"
                        FillPortions: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Shape: ='BadgeCanvas.Shape'.Rounded
                        ThemeColor: ='BadgeCanvas.ThemeColor'.Danger
                        Width: =210
                  - conSpacer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                  - conSearch:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =44
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Width: =380
                      Children:
                        - txtSearchHistoric:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              BorderColor: =RGBA(0, 64, 47, 1)
                              BorderThickness: =1
                              Default: =""
                              Font: =Font.'Open Sans'
                              Height: =36
                              HintText: ="Search by title or owner..."
                              HoverBorderColor: =RGBA(0, 64, 47, 1)
                              PaddingLeft: =12
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Width: =350
                              Y: =4
                        - btnClearSearch:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(120, 120, 120, 1)
                              Height: =26
                              Icon: =Icon.CancelBadge
                              OnSelect: =Reset(txtSearchHistoric)
                              Visible: =!IsBlank(txtSearchHistoric.Text)
                              Width: =26
                              X: =318
                              Y: =9
                  - lblCount:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(100, 100, 100, 1)
                        FillPortions: =0
                        Font: =Font.'Open Sans'
                        Height: =36
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =12
                        Text: =CountRows(galArchive.AllItems) & " records"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =90
            - conTableHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(220, 222, 224, 1)
                  BorderThickness: =1
                  Fill: =RGBA(248, 249, 250, 1)
                  FillPortions: =0
                  Height: =38
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingLeft: =20
                  PaddingRight: =16
                Children:
                  - lblColTitle:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(90, 90, 90, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =11
                        Text: ="TITLE"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =460
                  - lblColType:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(90, 90, 90, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        FillPortions: =0
                        Height: =38
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =11
                        Text: ="TYPE"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =220
                  - lblColOwner:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(90, 90, 90, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        FillPortions: =0
                        Height: =38
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =11
                        Text: ="OWNER"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =280
                  - lblColDate:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(90, 90, 90, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        FillPortions: =0
                        Height: =38
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =11
                        Text: ="PLANNED DATE"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =160
                  - lblColStatus:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(90, 90, 90, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        FillPortions: =0
                        Height: =38
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =11
                        Text: ="STATUS"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =180
            - galArchive:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(245, 246, 248, 1)
                  Items: |-
                    =SortByColumns(
                        Filter(
                            'Policy Proof Tracker',
                            'Planned Publish Date' < Today(),
                            IsBlank(txtSearchHistoric.Text) ||
                            Lower(txtSearchHistoric.Text) in Lower(Title) ||
                            Lower(txtSearchHistoric.Text) in Lower(Owner.DisplayName)
                        ),
                        "PublishDate",
                        SortOrder.Descending
                    )
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  TemplateFill: =RGBA(0, 0, 0, 0)
                  TemplatePadding: =0
                  TemplateSize: =56
                Children:
                  - conRow:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(220, 222, 224, 1)
                        BorderThickness: =1
                        DropShadow: =DropShadow.None
                        Fill: =If(ThisItem.Published = false, RGBA(255, 240, 240, 1), RGBA(255, 255, 255, 1))
                        Height: =55
                        Width: =Parent.TemplateWidth
                      Children:
                        - recTypeBar:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Fill: =LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode)
                              Height: =Parent.Height
                              Width: =5
                        - lblRowTitle:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =55
                              PaddingLeft: =14
                              Size: =13
                              Text: =If(Len(ThisItem.Title) > 55, Left(ThisItem.Title, 52) & "...", ThisItem.Title)
                              Tooltip: =ThisItem.Title
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =460
                              X: =5
                        - badgeType:
                            Control: Badge@0.0.24
                            Properties:
                              Appearance: ='BadgeCanvas.Appearance'.Tint
                              Content: =ThisItem.'Document Type'.Value
                              Font: =Font.Lato
                              FontSize: =16
                              Height: =26
                              Shape: ='BadgeCanvas.Shape'.Rounded
                              ThemeColor: |-
                                =Switch(
                                    ThisItem.'Document Type'.Value,
                                    "📗 Manual",             'BadgeCanvas.ThemeColor'.Success,
                                    "📄 CFI",                'BadgeCanvas.ThemeColor'.Informative,
                                    "📄 CFSO",               'BadgeCanvas.ThemeColor'.Important,
                                    "📕 SOI",                'BadgeCanvas.ThemeColor'.Danger,
                                    "📖 Regulation",         'BadgeCanvas.ThemeColor'.Brand,
                                    "📄 CBN",                'BadgeCanvas.ThemeColor'.Severe,
                                    "📄 ACSO",               'BadgeCanvas.ThemeColor'.Warning,
                                    "📑 Internal Document",  'BadgeCanvas.ThemeColor'.Severe,
                                    "📜 Newsletter Item",    'BadgeCanvas.ThemeColor'.Informative,
                                    'BadgeCanvas.ThemeColor'.Warning
                                )
                              Visible: =!IsBlank(ThisItem.'Document Type'.Value)
                              Width: =210
                              X: =465
                              Y: =15
                        - imgOwnerThumb:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(200, 200, 200, 1)
                              BorderThickness: =1
                              Height: =32
                              Image: =ThisItem.Owner.Picture
                              RadiusBottomLeft: =16
                              RadiusBottomRight: =16
                              RadiusTopLeft: =16
                              RadiusTopRight: =16
                              Width: =32
                              X: =680
                              Y: =12
                        - lblRowOwner:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(80, 80, 80, 1)
                              Font: =Font.'Open Sans'
                              Height: =55
                              Size: =12
                              Text: =ThisItem.Owner.DisplayName
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =230
                              X: =718
                        - lblRowDate:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(80, 80, 80, 1)
                              Font: =Font.'Open Sans'
                              Height: =55
                              Size: =12
                              Text: =Text(ThisItem.'Planned Publish Date', "dd mmm yyyy")
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =155
                              X: =950
                        - badgeStatus:
                            Control: Badge@0.0.24
                            Properties:
                              Appearance: ='BadgeCanvas.Appearance'.Tint
                              Content: =If(ThisItem.Published, "✓ Published", "⚠ Not Published")
                              Height: =26
                              Shape: ='BadgeCanvas.Shape'.Rounded
                              ThemeColor: =If(ThisItem.Published, 'BadgeCanvas.ThemeColor'.Success, 'BadgeCanvas.ThemeColor'.Danger)
                              Width: =140
                              X: =1108
                              Y: =15
                        - btnRowSelect:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderThickness: =0
                              Color: =RGBA(0, 0, 0, 0)
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(0, 0, 0, 0)
                              Font: =Font.'Open Sans'
                              Height: =55
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =RGBA(0, 64, 47, 0.05)
                              OnSelect: |-
                                =Set(varSelectPolicy, "Filled");
                                Set(varSelectedItem, ThisItem);
                                Set(varSourceScreen, "Historic");
                                Set(varUnsavedChanges, false);
                                Set(varSelectedRelease, ThisItem);
                                Set(varSelectedPerson, ThisItem.Owner);
                                Set(varScrollDate, Blank());
                                Set(varLoadingLinks, true);
                                ClearCollect(colLinks, Filter(PolicyLinks, PolicyTrackerSource.Id = ThisItem.ID));
                                Set(varLoadingLinks, false);
                                Navigate(ViewItem, ScreenTransition.Fade)
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =RGBA(0, 64, 47, 0.1)
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Text: =""
                              Width: =1260
            - conFooter:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(220, 222, 224, 1)
                  BorderThickness: =1
                  Fill: =RGBA(248, 249, 250, 1)
                  FillPortions: =0
                  Height: =38
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingLeft: =20
                Children:
                  - lblFooterPublished:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(80, 80, 80, 1)
                        Font: =Font.'Open Sans'
                        Height: =38
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =12
                        Text: |-
                          =CountRows(Filter('Policy Proof Tracker', 'Planned Publish Date' < Today() && Published = true)) & " published  ·  " &
                          CountRows(Filter('Policy Proof Tracker', 'Planned Publish Date' < Today() && Published = false)) & " not yet published"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =600
