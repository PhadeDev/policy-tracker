Screens:
  Historic_2:
    Properties:
      Fill: =RGBA(244, 246, 243, 1)
      OnVisible: |-
        =Set(varHistoricSearch2, "");
        Set(varHistoricTypeFilter2, "")
    Children:
      - conScreen2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(244, 246, 243, 1)
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =12
            PaddingBottom: =16
            PaddingLeft: =24
            PaddingRight: =24
            PaddingTop: =20
            Width: =Parent.Width
          Children:
            - conTopBar2:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =64
                  RadiusBottomLeft: =14
                  RadiusBottomRight: =14
                  RadiusTopLeft: =14
                  RadiusTopRight: =14
                  Width: =Parent.Width
                Children:
                  - btnBackToMain2:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Color: =RGBA(91, 105, 97, 1)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        HoverColor: =RGBA(91, 105, 97, 1)
                        HoverFill: =RGBA(227, 239, 232, 1)
                        OnSelect: =Navigate(Main, ScreenTransition.Fade)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: ="< Main"
                        Width: =90
                        X: =13
                        Y: =13
                  - lblArchiveTitle2:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(22, 33, 28, 1)
                        Font: =Font.'Lato Black'
                        Height: =64
                        Size: =15
                        Text: ="Historic Archive"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =200
                        X: =118
                  - txtHistoricSearch2:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Default: =""
                        DelayOutput: =true
                        Font: =Font.'Open Sans'
                        HintText: ="Search title or owner..."
                        HoverBorderColor: =RGBA(11, 74, 54, 1)
                        OnChange: =Set(varHistoricSearch2, Self.Text)
                        PaddingLeft: =10
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =10
                        Width: =280
                        X: =330
                        Y: =13
                  - galTypeChips2:
                      Control: Gallery@2.15.0
                      Variant: Horizontal
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Items: =colChoiceColors
                        LayoutMinHeight: =30
                        ShowScrollbar: =false
                        TemplateSize: =105
                        Width: =Parent.Width - 650
                        X: =630
                        Y: =17
                      Children:
                        - ChipBg2:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderThickness: =0
                              Color: =RGBA(255, 255, 255, 1)
                              DisplayMode: =DisplayMode.View
                              Fill: =If(varHistoricTypeFilter2 = ThisItem.ChoiceValue, ThisItem.ColorCode, ColorFade(ThisItem.ColorCode, 0.85))
                              Font: =Font.'Open Sans'
                              Height: =26
                              OnSelect: =Select(Parent)
                              RadiusBottomLeft: =13
                              RadiusBottomRight: =13
                              RadiusTopLeft: =13
                              RadiusTopRight: =13
                              Text: =""
                              Width: =100
                              X: =5
                              Y: =2
                        - ChipLabel2:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              Color: =If(varHistoricTypeFilter2 = ThisItem.ChoiceValue, RGBA(255,255,255,1), RGBA(60,60,60,1))
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =26
                              OnSelect: =Select(Parent)
                              Size: =9
                              Text: =Mid(ThisItem.ChoiceValue, Find(" ", ThisItem.ChoiceValue) + 1)
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =100
                              X: =5
                              Y: =2
                  - btnAllTypes2:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderThickness: =0
                        Color: =If(IsBlank(varHistoricTypeFilter2) || varHistoricTypeFilter2 = "", RGBA(255,255,255,1), RGBA(60,60,60,1))
                        Fill: =If(IsBlank(varHistoricTypeFilter2) || varHistoricTypeFilter2 = "", RGBA(11, 74, 54, 1), RGBA(238, 238, 238, 1))
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =26
                        OnSelect: =Set(varHistoricTypeFilter2, "")
                        RadiusBottomLeft: =13
                        RadiusBottomRight: =13
                        RadiusTopLeft: =13
                        RadiusTopRight: =13
                        Size: =9
                        Text: ="All"
                        Width: =70
                        X: =555
                        Y: =19
            - lblHistoricCount2:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(91, 105, 97, 1)
                  Font: =Font.'Open Sans'
                  Height: =24
                  Size: =10
                  Text: |-
                    =CountRows(
                        Filter(
                            'Policy Proof Tracker',
                            'Planned Publish Date' < Today() &&
                            (IsBlank(varHistoricSearch2) || Lower(varHistoricSearch2) in Lower(Title) || Lower(varHistoricSearch2) in Lower(Owner.DisplayName)) &&
                            (IsBlank(varHistoricTypeFilter2) || varHistoricTypeFilter2 = "" || 'Document Type'.Value = varHistoricTypeFilter2)
                        )
                    ) & " items shown"
                  Width: =500
                  X: =4
            - galHistoricMonths2:
                Control: Gallery@2.15.0
                Variant: VariableHeight
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Items: |-
                    =Sort(
                        AddColumns(
                            GroupBy(
                                AddColumns(
                                    Filter(
                                        'Policy Proof Tracker',
                                        'Planned Publish Date' < Today() &&
                                        (IsBlank(varHistoricSearch2) || Lower(varHistoricSearch2) in Lower(Title) || Lower(varHistoricSearch2) in Lower(Owner.DisplayName)) &&
                                        (IsBlank(varHistoricTypeFilter2) || varHistoricTypeFilter2 = "" || 'Document Type'.Value = varHistoricTypeFilter2)
                                    ),
                                    MonthStart, Date(Year('Planned Publish Date'), Month('Planned Publish Date'), 1)
                                ),
                                MonthStart,
                                GroupedItems
                            ),
                            ItemCount, CountRows(GroupedItems)
                        ),
                        MonthStart,
                        SortOrder.Descending
                    )
                  TemplateSize: =200
                  Width: =Parent.Width
                Children:
                  - conMonthGroup1:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        Fill: =RGBA(0,0,0,0)
                        Height: =32 + CountRows(ThisItem.GroupedItems) * 60
                        Width: =Parent.Width
                      Children:
                        - lblMonthLabel1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(91, 105, 97, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =24
                              Size: =10
                              Text: =Upper(Text(ThisItem.MonthStart, "mmmm yyyy"))
                              Width: =Parent.Width - 20
                              X: =20
                        - galMonthRows1:
                            Control: Gallery@2.15.0
                            Variant: BrowseLayout_Vertical_OneTextVariant_ver5.0
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Height: =CountRows(ThisItem.GroupedItems) * 60
                              Items: =Sort(ThisItem.GroupedItems, 'Planned Publish Date', SortOrder.Descending)
                              TemplateSize: =60
                              Width: =Parent.Width
                              Y: =28
                            Children:
                              - conMonthRowCard1:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    BorderColor: =RGBA(223, 229, 224, 1)
                                    BorderThickness: =1
                                    DropShadow: =DropShadow.None
                                    Fill: =RGBA(255, 255, 255, 1)
                                    Height: =52
                                    RadiusBottomLeft: =10
                                    RadiusBottomRight: =10
                                    RadiusTopLeft: =10
                                    RadiusTopRight: =10
                                    Width: =Parent.TemplateWidth - 20
                                    X: =20
                                  Children:
                                    - recAccent1:
                                        Control: Rectangle@2.3.0
                                        Properties:
                                          BorderThickness: =0
                                          Fill: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode), RGBA(150,150,150,1))
                                          Height: =Parent.Height
                                          Width: =4
                                    - pillDocType1:
                                        Control: ModernText@1.0.0
                                        Properties:
                                          Align: =Align.Center
                                          BorderColor: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode), RGBA(150, 150, 150, 1))
                                          BorderStyle: =BorderStyle.Solid
                                          BorderThickness: =1
                                          Color: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode), RGBA(150, 150, 150, 1))
                                          Fill: =Coalesce(LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCodeFaded), RGBA(150, 150, 150, 0.1))
                                          Font: =Font.Lato
                                          FontWeight: =FontWeight.Bold
                                          Height: =22
                                          RadiusBottomLeft: =11
                                          RadiusBottomRight: =11
                                          RadiusTopLeft: =11
                                          RadiusTopRight: =11
                                          Size: =9
                                          Text: =Mid(ThisItem.'Document Type'.Value, Find(" ", ThisItem.'Document Type'.Value) + 1)
                                          Width: =120
                                          X: =16
                                          Y: =15
                                    - lblRowTitle1:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =RGBA(22, 33, 28, 1)
                                          Font: =Font.'Open Sans'
                                          FontWeight: =FontWeight.Bold
                                          Height: =Parent.Height
                                          Size: =11
                                          Text: =If(Len(ThisItem.Title) > 55, Left(ThisItem.Title, 52) & "...", ThisItem.Title)
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =430
                                          X: =150
                                    - imgRowOwner1:
                                        Control: Image@2.2.3
                                        Properties:
                                          Height: =26
                                          Image: =ThisItem.Owner.Picture
                                          RadiusBottomLeft: =13
                                          RadiusBottomRight: =13
                                          RadiusTopLeft: =13
                                          RadiusTopRight: =13
                                          Width: =26
                                          X: =600
                                          Y: =13
                                    - lblRowOwner1:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =RGBA(91, 105, 97, 1)
                                          Font: =Font.'Open Sans'
                                          Height: =Parent.Height
                                          Size: =10
                                          Text: =ThisItem.Owner.DisplayName
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =210
                                          X: =636
                                    - lblRowDate1:
                                        Control: Label@2.5.1
                                        Properties:
                                          Align: =Align.Right
                                          Color: =RGBA(91, 105, 97, 1)
                                          Font: =Font.'Open Sans'
                                          Height: =Parent.Height
                                          Size: =10
                                          Text: =Text(ThisItem.'Planned Publish Date', "dd mmm yyyy")
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =110
                                          X: =860
                                    - dotRowStatus1:
                                        Control: Classic/Button@2.2.0
                                        Properties:
                                          BorderThickness: =0
                                          DisplayMode: =DisplayMode.View
                                          Fill: =If(ThisItem.Published, RGBA(76, 175, 125, 1), RGBA(200, 60, 60, 1))
                                          Height: =10
                                          HoverFill: =Self.Fill
                                          PressedFill: =Self.Fill
                                          RadiusBottomLeft: =5
                                          RadiusBottomRight: =5
                                          RadiusTopLeft: =5
                                          RadiusTopRight: =5
                                          Text: =""
                                          Tooltip: =If(ThisItem.Published, "Published", "Not marked as published")
                                          Width: =10
                                          X: =985
                                          Y: =21
                                    - btnRowClick1:
                                        Control: Classic/Button@2.2.0
                                        Properties:
                                          BorderThickness: =0
                                          DisplayMode: =DisplayMode.Edit
                                          Fill: =RGBA(0, 0, 0, 0)
                                          Height: =Parent.Height
                                          HoverFill: =RGBA(11, 74, 54, 0.05)
                                          OnSelect: |-
                                            =Select(Parent);
                                            Set(varSelectPolicy, "Filled");
                                            Set(varSelectedItem, ThisItem);
                                            Set(varSourceScreen, "Historic");
                                            Set(varUnsavedChanges, false);
                                            Set(varSelectedRelease, ThisItem);
                                            Set(varLoadingLinks, true);
                                            Clear(colLinks);
                                            Navigate(ViewItem, ScreenTransition.Fade)
                                          PressedFill: =RGBA(11, 74, 54, 0.09)
                                          RadiusBottomLeft: =10
                                          RadiusBottomRight: =10
                                          RadiusTopLeft: =10
                                          RadiusTopRight: =10
                                          Text: =""
                                          Width: =Parent.Width
