                  RadiusBottomLeft: =14
                  RadiusBottomRight: =14
                  RadiusTopLeft: =14
                  RadiusTopRight: =14
                  Visible: =!(DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") >= 0 && DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") < 10 && !ckbHighPriority1.Value)
