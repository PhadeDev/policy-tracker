                        Height: =20
                        Size: =11
                        Text: |-
                          =CountRows(
                              Filter('Policy Proof Tracker', 'Planned Publish Date' = varUpcomingThursday && 'Approved For Release By'.Value <> "Not Yet Approved" && !IsBlank('Approved For Release By'.Value))
