                                                              'Planned Publish Date' < Today() &&
                                                              Published = true &&
                                                              (varFilterOwner = false || Owner.Email = User().Email) &&
                                                              (varTypeFilter = "" || 'Document Type'.Value = varTypeFilter)
                                                          ),
                                                          PlannedDate, 'Planned Publish Date',
                                                          ReleaseDateText, Text('Planned Publish Date', "dddd, dd mmmm yyyy")
                                                      ),
                                                      PlannedDate,
                                                      GroupedItems
                                                  ),
                                                  ItemCount, CountRows(GroupedItems)
                                              ),
                                              PlannedDate,
                                              SortOrder.Descending
                                          ),

                                          "Future",
                                          Sort(
                                              AddColumns(
                                                  GroupBy(
                                                      AddColumns(
                                                          Filter(
                                                              'Policy Proof Tracker',
                                                              'Planned Publish Date' > DateAdd(Today(), 28, "Days") &&
                                                              (varFilterOwner = false || Owner.Email = User().Email) &&
                                                              (varTypeFilter = "" || 'Document Type'.Value = varTypeFilter)
                                                          ),
                                                          PlannedDate, 'Planned Publish Date',
                                                          ReleaseDateText, Text('Planned Publish Date', "dddd, dd mmmm yyyy")
                                                      ),
                                                      PlannedDate,
                                                      GroupedItems
                                                  ),
                                                  ItemCount, CountRows(GroupedItems)
                                              ),
                                              PlannedDate,
                                              SortOrder.Ascending
                                          ),

                                          "Current",
                                          Sort(
                                              AddColumns(
                                                  GroupBy(
                                                      AddColumns(
                                                          Filter(
                                                              'Policy Proof Tracker',
                                                              'Planned Publish Date' >= Today() &&
                                                              'Planned Publish Date' <= DateAdd(Today(), 28, "Days") &&
                                                              (varFilterOwner = false || Owner.Email = User().Email) &&
                                                              (varTypeFilter = "" || 'Document Type'.Value = varTypeFilter)
                                                          ),
                                                          PlannedDate, 'Planned Publish Date',
                                                          ReleaseDateText, Text('Planned Publish Date', "dddd, dd mmmm yyyy")
                                                      ),
                                                      PlannedDate,
                                                      GroupedItems
                                                  ),
                                                  ItemCount, CountRows(GroupedItems)
