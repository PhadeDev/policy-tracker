                        Y: =16
                  - lblHeroTitle1:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(238, 247, 242, 1)
                        Font: =Font.'Lato Black'
                        Height: =28
                        Size: =16
                        Text: |-
                          ="Thursday, " & Text(varUpcomingThursday, "dd mmmm yyyy") & " — " &
                          CountRows(Filter('Policy Proof Tracker', 'Planned Publish Date' = varUpcomingThursday)) & " items"
