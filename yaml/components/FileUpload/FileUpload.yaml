ComponentDefinitions:
  cmpFileUpload:
    DefinitionType: CanvasComponent
    CustomProperties:
      HeaderText:
        PropertyKind: Input
        DisplayName: HeaderText
        Description: Header text for the upload dialog
        DataType: Text
        Default: ="Upload Documents"
      MaxFileSize:
        PropertyKind: Input
        DisplayName: MaxFileSize
        Description: Maximum file size in MB
        DataType: Number
        Default: =10
      MaxFiles:
        PropertyKind: Input
        DisplayName: MaxFiles
        Description: Maximum number of files
        DataType: Number
        Default: =3
      OnSave:
        PropertyKind: Event
        DisplayName: OnSave
        Description: Save button clicked
        ReturnType: None
        Default: =
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      Height: =700
    Children:
      - lblHeader_4:
          Control: Text@0.0.51
          Properties:
            Height: =50
            Size: =20
            Text: =cmpFileUpload.HeaderText
            Weight: ='TextCanvas.Weight'.Semibold
            Width: =Parent.Width - 48
            X: =24
            Y: =24
      - conUploadZone:
          Control: GroupContainer@1.4.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(212, 212, 216, 1)
            BorderStyle: =BorderStyle.Dashed
            BorderThickness: =2
            DropShadow: =DropShadow.None
            Fill: =RGBA(250, 249, 248, 1)
            RadiusBottomLeft: =12
            RadiusBottomRight: =12
            RadiusTopLeft: =12
            RadiusTopRight: =12
            Width: =Parent.Width - 48
            X: =24
            Y: =90
          Children:
            - conIconCircle:
                Control: GroupContainer@1.4.0
                Variant: ManualLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(228, 228, 231, 1)
                  Height: =64
                  RadiusBottomLeft: =32
                  RadiusBottomRight: =32
                  RadiusTopLeft: =32
                  RadiusTopRight: =32
                  Width: =64
                  X: =(Parent.Width - 64) / 2
                  Y: =50
                Children:
                  - icnUpload:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        Color: =RGBA(96, 94, 92, 1)
                        Height: =32
                        Icon: =Icon.Add
                        Width: =32
                        X: =16
                        Y: =16
            - lblClickToSelect:
                Control: Text@0.0.51
                Properties:
                  Align: =Align.Center
                  Height: =30
                  Text: ="Click to select files"
                  Weight: ='TextCanvas.Weight'.Semibold
                  Width: =Parent.Width
                  Y: =125
            - lblDragDrop:
                Control: Text@0.0.51
                Properties:
                  Align: =Align.Center
                  Height: =25
                  Size: =12
                  Text: ="or drag and drop"
                  Width: =Parent.Width
                  Y: =155
            - btnInvisible:
                Control: Button@0.0.45
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Transparent
                  Height: =Parent.Height
                  OnSelect: =Select(attFiles)
                  Text: =""
                  Width: =Parent.Width
            - attFiles:
                Control: Attachments@2.3.0
                Properties:
                  AddAttachmentText: =""
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(0, 0, 0, 0)
                  Height: =Parent.Height
                  Items: =Blank()
                  MaxAttachments: =cmpFileUpload.MaxFiles
                  NoAttachmentsText: =""
                  OnAddFile: |-
                    =With(
                        {duplicateNames: Concat(Filter(Self.Attachments, ThisRecord.Name in var_uploadFile_listeAttachment.Name), Name, ", ")},
                        ForAll(Self.Attachments, If(!(ThisRecord.Name in var_uploadFile_listeAttachment.Name), Collect(var_uploadFile_listeAttachment, ThisRecord)));
                        If(!IsBlank(duplicateNames), Notify("Duplicates skipped: " & duplicateNames, NotificationType.Warning));
                        Reset(Self)
                    )
                  Width: =Parent.Width
      - lblHelperLine1:
          Control: Text@0.0.51
          Properties:
            Align: =Align.Center
            Height: =25
            Size: =11
            Text: ="All file types accepted"
            Width: =Parent.Width - 48
            X: =24
            Y: =300
      - lblHelperLine2:
          Control: Text@0.0.51
          Properties:
            Align: =Align.Center
            Height: =25
            Size: =11
            Text: ="Max 10 MB per file"
            Width: =Parent.Width - 48
            X: =24
            Y: =325
      - galFiles:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Height: =280
            Items: =var_uploadFile_listeAttachment
            TemplatePadding: =8
            TemplateSize: =80
            Width: =Parent.Width - 48
            X: =24
            Y: =360
          Children:
            - conFileCard:
                Control: GroupContainer@1.4.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =RGBA(229, 231, 235, 1)
                  BorderThickness: =1
                  Fill: =RGBA(249, 250, 251, 1)
                  Height: =72
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.TemplateWidth
                Children:
                  - conIconBg:
                      Control: GroupContainer@1.4.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(243, 244, 246, 1)
                        Height: =48
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Width: =48
                        X: =16
                        Y: =12
                      Children:
                        - icnFile:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              Color: =RGBA(96, 94, 92, 1)
                              Height: =24
                              Icon: =Icon.Document
                              Visible: =false
                              Width: =24
                              X: =12
                              Y: =12
