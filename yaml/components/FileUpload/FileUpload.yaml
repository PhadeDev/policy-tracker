                  - lblFileName:
                      Control: Text@0.0.51
                      Properties:
                        Height: =22
                        Size: =13
                        Text: =Coalesce(ThisItem.Name,"File name")
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 140
                        X: =76
                        Y: =14
                  - lblFileSize:
                      Control: Text@0.0.51
                      Properties:
                        Height: =18
                        Size: =11
                        Text: ="Ready"
                        Width: =Parent.Width - 140
                        X: =76
                        Y: =36
                  - icnRemove:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        Color: =RGBA(156, 163, 175, 1)
                        Height: =20
                        HoverColor: =RGBA(220, 38, 38, 1)
                        Icon: =Icon.Cancel
                        OnSelect: =Remove(var_uploadFile_listeAttachment, ThisItem)
                        Width: =20
                        X: =Parent.Width - 36
                        Y: =26
      - conActions:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =48
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            Width: =Parent.Width - 48
            X: =24
            Y: =650
          Children:
            - btnCancel:
                Control: Button@0.0.45
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Secondary
                  BorderRadius: =8
                  Height: =40
                  OnSelect: =Clear(var_uploadFile_listeAttachment);Reset(attFiles)
                  Text: ="Cancel"
                  Width: =100
            - btnSave:
                Control: Button@0.0.45
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Primary
                  BorderRadius: =8
                  Height: =40
                  OnSelect: =cmpFileUpload.OnSave()
                  Text: ="Save"
                  Width: =140
