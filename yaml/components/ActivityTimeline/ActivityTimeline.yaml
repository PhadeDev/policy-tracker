ComponentDefinitions:
  cmpActivityTimeline:
    DefinitionType: CanvasComponent
    AccessAppScope: true
    CustomProperties:
      ActiveFilter:
        PropertyKind: Output
        DisplayName: ActiveFilter
        Description: The currently selected filter value.
        DataType: Text
      CardHeight:
        PropertyKind: Input
        DisplayName: CardHeight
        Description: Height of a standard entry card with no sub-detail.
        DataType: Number
        Default: =92
      FilterOptions:
        PropertyKind: Input
        DisplayName: FilterOptions
        Description: Table of {Value:Text} rows for the filter dropdown. Values must match Category values in Items and IconMap.
        DataType: Table
        Default: |-
          =Table(
            {Value: "All Activities"},
            {Value: "Comments"},
            {Value: "Emails"},
            {Value: "Documents"},
            {Value: "Tasks"},
            {Value: "System Events"}
          )
      HideHeader:
        PropertyKind: Input
        DisplayName: HideHeader
        Description: When true hides the toolbar with filter entry count and action buttons.
        DataType: Boolean
        Default: =false
      IconMap:
        PropertyKind: Input
        DisplayName: IconMap
        Description: Maps Category values to icon types, dot colors and card icon colors. Category match is case-insensitive. Include a row with Category="default" as fallback. IconType values are comment, email, document, person, checkbadge, check, workflow, folder. IconColor is a hex string e.g. "#7C3AED" used for the top-right card icon.
        DataType: Table
        Default: |-
          =Table(
            {Category: "Comments",      IconType: "comment",    DotColor: RGBA(124, 58,  237, 1), IconColor: "#7C3AED"},
            {Category: "Emails",        IconType: "email",      DotColor: RGBA(37,  99,  235, 1), IconColor: "#2563EB"},
            {Category: "Documents",     IconType: "document",   DotColor: RGBA(217, 119, 6,   1), IconColor: "#D97706"},
            {Category: "Tasks",         IconType: "person",     DotColor: RGBA(107, 114, 128, 1), IconColor: "#6B7280"},
            {Category: "System Events", IconType: "workflow",   DotColor: RGBA(2,   132, 199, 1), IconColor: "#0284C7"},
            {Category: "default",       IconType: "comment",    DotColor: RGBA(107, 114, 128, 1), IconColor: "#6B7280"}
          )
      IsLoading:
        PropertyKind: Input
        DisplayName: IsLoading
        Description: When true shows skeleton placeholder cards instead of data.
        DataType: Boolean
        Default: =false
      Items:
        PropertyKind: Input
        DisplayName: Items
        Description: Audit trail entries. Schema - EventTitle, EventDescription, Author, DisplayDateTime, Category (must match FilterOptions values and IconMap), HasSubDetail, SubTo, SubCC, SubPriority (High or Normal), SubMessage. No IconType needed - derived automatically from Category via IconMap.
        DataType: Table
        Default: |-
          =Table(
            {EventTitle: "Comment Added",          EventDescription: "I've reviewed the technical requirements. Looks good to proceed.", Author: "Sarah Johnson",   DisplayDateTime: "Today 2:30 PM",        Category: "Comments",      HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Email Notification Sent", EventDescription: "Request for Technical Review",                                    Author: "Jordan Mitchell", DisplayDateTime: "Nov 14, 2024 3:45 PM", Category: "Emails",        HasSubDetail: true,  SubTo: "Sarah Johnson, Mike Chen", SubCC: "Lisa Park, Director Office", SubPriority: "High",   SubMessage: "Please review the attached technical specifications for the VNS Upgrade project. We need approval by end of week."},
            {EventTitle: "Document Uploaded",      EventDescription: "System_Architecture.png",                                         Author: "Mike Chen",       DisplayDateTime: "Nov 14, 2024 11:20 AM",Category: "Documents",     HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Task Assigned",          EventDescription: "Taylor Bennett assigned to Technical Review",                     Author: "System",          DisplayDateTime: "Nov 12, 2024 9:00 AM", Category: "Tasks",         HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Email Notification Sent", EventDescription: "Task Assignment Notification",                                   Author: "System",          DisplayDateTime: "Nov 12, 2024 9:00 AM", Category: "Emails",        HasSubDetail: true,  SubTo: "Taylor Bennett",           SubCC: "Jordan Mitchell",        SubPriority: "Normal", SubMessage: "You have been assigned a new task: Technical Review for case Dev-2024-000007."},
            {EventTitle: "Phase Completed",        EventDescription: "Budget Review completed",                                         Author: "System",          DisplayDateTime: "Nov 10, 2024 2:30 PM", Category: "System Events", HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Task Completed",         EventDescription: "Initial submission",                                              Author: "Jordan Mitchell", DisplayDateTime: "Nov 10, 2024 2:30 PM", Category: "Tasks",         HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Document Uploaded",      EventDescription: "VNS_Requirements_v2.1.pdf",                                       Author: "Jordan Mitchell", DisplayDateTime: "Nov 10, 2024 2:25 PM", Category: "Documents",     HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Workflow Started",       EventDescription: "FRM Competitive workflow initiated",                              Author: "Jordan Mitchell", DisplayDateTime: "Nov 8, 2024 9:15 AM",  Category: "System Events", HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""},
            {EventTitle: "Case Created",           EventDescription: "New case initiated",                                              Author: "Jordan Mitchell", DisplayDateTime: "Nov 8, 2024 9:00 AM",  Category: "System Events", HasSubDetail: false, SubTo: "",                         SubCC: "",                       SubPriority: "",       SubMessage: ""}
          )
      OnExport:
        PropertyKind: Event
        DisplayName: OnExport
        Description: Fires when the export button is tapped.
        ReturnType: None
        Default: =false
      OnItemSelect:
        PropertyKind: Event
        DisplayName: OnItemSelect
        Description: Fires when an audit trail card is tapped.
        ReturnType: None
        Default: =false
      OnPrint:
        PropertyKind: Event
        DisplayName: OnPrint
        Description: Fires when the print button is tapped.
        ReturnType: None
        Default: =false
      SelectedItem:
        PropertyKind: Output
        DisplayName: SelectedItem
        Description: The last tapped audit trail record.
        DataType: Record
      ShowScrollbar:
        PropertyKind: Input
        DisplayName: ShowScrollbar
        Description: When true shows the scrollbar on the timeline gallery.
        DataType: Boolean
        Default: =false
      SubDetailCardHeight:
        PropertyKind: Input
        DisplayName: SubDetailCardHeight
        Description: Height of an entry card that includes the sub-detail panel.
        DataType: Number
        Default: =212
      Theme:
        PropertyKind: Input
        DisplayName: Theme
        Description: '"Light" or "Dark"'
        DataType: Text
        Default: ="Light"
      ThemeConfig:
        PropertyKind: Input
        DisplayName: ThemeConfig
        Description: Light and Dark theme token sets. Override to customise colors.
        DataType: Record
        Default: |-
          ={
            Light: {
              background:       ColorValue("#F9FAFB"),
              surface:          ColorValue("#FFFFFF"),
              border:           ColorValue("#E5E7EB"),
              rail:             ColorValue("#DCDCE0"),
              dotBorder:        ColorValue("#F9FAFB"),
              text:             ColorValue("#111827"),
              textMuted:        ColorValue("#6B7280"),
              textSubtle:       ColorValue("#9CA3AF"),
              toolbarSep:       ColorValue("#E5E7EB"),
              htmlBg:           "#f9fafb",
              htmlBorder:       "#e5e7eb",
              htmlText:         "#374151",
              htmlTextMuted:    "#9ca3af",
              htmlPriorityHigh: "#ef4444"
            },
            Dark: {
              background:       ColorValue("#111827"),
              surface:          ColorValue("#1F2937"),
              border:           ColorValue("#374151"),
              rail:             ColorValue("#4B5563"),
              dotBorder:        ColorValue("#111827"),
              text:             ColorValue("#F3F4F6"),
              textMuted:        ColorValue("#9CA3AF"),
              textSubtle:       ColorValue("#6B7280"),
              toolbarSep:       ColorValue("#374151"),
              htmlBg:           "#1f2937",
              htmlBorder:       "#374151",
              htmlText:         "#e5e7eb",
              htmlTextMuted:    "#6b7280",
              htmlPriorityHigh: "#ef4444"
            }
          }
    Properties:
      ActiveFilter: =If(IsBlank(_auditFilter), "All Activities", _auditFilter)
      Height: =App.Height
      OnReset: =Set(_auditFilter, Blank())
      SelectedItem: =_auditSelectedItem
      Width: =App.Width
    Children:
      - conRoot_3:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: |-
              =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.background)
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
          Children:
            - conToolbar_3:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: |-
                    =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.surface)
                  FillPortions: =0
                  Height: =50
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  LayoutMinHeight: =0
                  PaddingBottom: =8
                  PaddingLeft: =16
                  PaddingRight: =8
                  PaddingTop: =8
                  Visible: =!cmpActivityTimeline.HideHeader
                Children:
                  - drpActivityFilter:
                      Control: ModernCombobox@1.0.0
                      Properties:
                        Appearance: =Appearance.Outline
                        DefaultSelectedItems: =Filter(cmpActivityTimeline.FilterOptions, Value = "All Activities")
                        Height: =36
                        IsSearchable: =false
                        ItemDisplayText: =ThisItem.Value
                        Items: =cmpActivityTimeline.FilterOptions
                        OnChange: =Set(_auditFilter, Self.Selected.Value)
                        SelectMultiple: =false
                        Size: =13
                        Width: =180
                  - conSpacer:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                  - lblEntryCount:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        Color: |-
                          =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.textMuted)
                        Font: =Font.'Segoe UI'
                        Height: =32
                        LayoutMinWidth: =80
                        Text: =CountRows(galTimeline.AllItems) & " entries"
                        Width: =100
                  - shpToolbarSep:
                      Control: Rectangle@2.3.0
                      Properties:
                        Fill: |-
                          =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.toolbarSep)
                        Height: =28
                        LayoutMinWidth: =1
                        Width: =1
                  - conBtnPrint:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        FillPortions: =0
                        Height: =36
                        LayoutMinWidth: =36
                        Width: =36
                      Children:
                        - imgPrintIcon:
                            Control: Image@2.2.3
                            Properties:
                              Height: =18
                              Image: ="data:image/svg+xml," & EncodeUrl("<svg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='" & If(cmpActivityTimeline.Theme = "Dark", "#9CA3AF", "#6B7280") & "' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 6 2 18 2 18 9'/><path d='M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2'/><rect x='6' y='14' width='12' height='8'/></svg>")
                              Width: =18
                              X: =9
                              Y: =9
                        - btnPrintOverlay:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(0, 0, 0, 0)
                              Height: =36
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =RGBA(0, 0, 0, 0.06)
                              OnSelect: =cmpActivityTimeline.OnPrint()
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =RGBA(0, 0, 0, 0.1)
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Text: =""
                              Width: =36
                  - conBtnExport:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        FillPortions: =0
                        Height: =36
                        LayoutMinWidth: =36
                        Width: =36
                      Children:
                        - imgExportIcon:
                            Control: Image@2.2.3
                            Properties:
                              Height: =18
                              Image: ="data:image/svg+xml," & EncodeUrl("<svg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='" & If(cmpActivityTimeline.Theme = "Dark", "#9CA3AF", "#6B7280") & "' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'><path d='M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4'/><polyline points='7 10 12 15 17 10'/><line x1='12' y1='15' x2='12' y2='3'/></svg>")
                              Width: =18
                              X: =9
                              Y: =9
                        - btnExportOverlay:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(0, 0, 0, 0)
                              Height: =36
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =RGBA(0, 0, 0, 0.06)
                              OnSelect: =cmpActivityTimeline.OnExport()
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =RGBA(0, 0, 0, 0.1)
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Text: =""
                              Width: =36
                  - conBtnFullscreen:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        FillPortions: =0
                        Height: =36
                        LayoutMinWidth: =36
                        Width: =36
                      Children:
                        - imgFullscreenIcon:
                            Control: Image@2.2.3
                            Properties:
                              Height: =18
                              Image: ="data:image/svg+xml," & EncodeUrl("<svg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='" & If(cmpActivityTimeline.Theme = "Dark", "#9CA3AF", "#6B7280") & "' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'><polyline points='15 3 21 3 21 9'/><polyline points='9 21 3 21 3 15'/><line x1='21' y1='3' x2='14' y2='10'/><line x1='3' y1='21' x2='10' y2='14'/></svg>")
                              Width: =18
                              X: =9
                              Y: =9
                        - btnFullscreenOverlay:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(0, 0, 0, 0)
                              Height: =36
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =RGBA(0, 0, 0, 0.06)
                              OnSelect: =Set(_auditFullscreen, !_auditFullscreen)
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =RGBA(0, 0, 0, 0.1)
                              RadiusBottomLeft: =6
                              RadiusBottomRight: =6
                              RadiusTopLeft: =6
                              RadiusTopRight: =6
                              Text: =""
                              Width: =36
            - shpHeaderDivider:
                Control: Rectangle@2.3.0
                Properties:
                  AlignInContainer: =AlignInContainer.Stretch
                  Fill: |-
                    =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.border)
                  Height: =1
                  Visible: =!cmpActivityTimeline.HideHeader
            - conTimelineArea:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: |-
                    =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.background)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMinHeight: =0
                Children:
                  - conSkeleton:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutMinHeight: =0
                        Visible: =cmpActivityTimeline.IsLoading
                      Children:
                        - galSkeleton_2:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              Height: =Parent.Height
                              Items: =Sequence(6)
                              ShowScrollbar: =false
                              TemplatePadding: =0
                              TemplateSize: =cmpActivityTimeline.CardHeight + 32
                              Width: =Parent.Width
                            Children:
                              - conSkeletonLeft:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Height: =cmpActivityTimeline.CardHeight + 32
                                    Width: =52
                                    X: =16
                                  Children:
                                    - shpSkeletonLine:
                                        Control: Rectangle@2.3.0
                                        Properties:
                                          Fill: |-
                                            =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.rail)
                                          Height: =Parent.Height
                                          Width: =2
                                          X: =24
                                    - conSkeletonDot:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          Fill: |-
                                            =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.border)
                                          Height: =36
                                          RadiusBottomLeft: =18
                                          RadiusBottomRight: =18
                                          RadiusTopLeft: =18
                                          RadiusTopRight: =18
                                          Width: =36
                                          X: =8
                                          Y: =26
                              - conSkeletonCard_2:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    BorderColor: |-
                                      =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.border)
                                    BorderThickness: =1
                                    Fill: |-
                                      =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.surface)
                                    Height: =cmpActivityTimeline.CardHeight
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Width: =Parent.Width - 92
                                    X: =52
                                    Y: =16
                                  Children:
                                    - conSkeletonTitle:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          Fill: |-
                                            =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.border)
                                          Height: =12
                                          Width: =160
                                          X: =14
                                          Y: =14
                                    - conSkeletonDesc:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          Fill: |-
                                            =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.rail)
                                          Height: =10
                                          Width: =240
                                          X: =14
                                          Y: =34
                                    - conSkeletonMeta:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          Fill: |-
                                            =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.border)
                                          Height: =10
                                          Width: =140
                                          X: =14
                                          Y: =62
                  - galTimeline:
                      Control: Gallery@2.15.0
                      Variant: VariableHeight
                      Properties:
                        DelayItemLoading: =false
                        Height: =Parent.Height
                        Items: |-
                          =If(
                            IsBlank(_auditFilter) || _auditFilter = "All Activities",
                            cmpActivityTimeline.Items,
                            Filter(cmpActivityTimeline.Items, Category = _auditFilter)
                          )
                        LayoutMinHeight: =0
                        ShowScrollbar: =cmpActivityTimeline.ShowScrollbar
                        TemplatePadding: =0
                        TemplateSize: =cmpActivityTimeline.CardHeight + 32
                        Visible: =!cmpActivityTimeline.IsLoading
                        Width: =Parent.Width
                      Children:
                        - conCard:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              BorderColor: |-
                                =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.border)
                              BorderThickness: =1
                              DropShadow: =DropShadow.Semilight
                              Fill: |-
                                =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.surface)
                              Height: =If(ThisItem.HasSubDetail, cmpActivityTimeline.SubDetailCardHeight, cmpActivityTimeline.CardHeight)
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =6
                              PaddingBottom: =12
                              PaddingLeft: =14
                              PaddingRight: =14
                              PaddingTop: =12
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =Parent.Width - 92
                              X: =52
                              Y: =16
                            Children:
                              - conCardHeader:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    BorderStyle: =BorderStyle.None
                                    DropShadow: =DropShadow.None
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =8
                                    LayoutMinHeight: =56
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                  Children:
                                    - conTitleBlock:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          BorderStyle: =BorderStyle.None
                                          DropShadow: =DropShadow.None
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =4
                                          LayoutMinHeight: =0
                                          LayoutMinWidth: =0
                                          RadiusBottomLeft: =0
                                          RadiusBottomRight: =0
                                          RadiusTopLeft: =0
                                          RadiusTopRight: =0
                                        Children:
                                          - lblEventTitle:
                                              Control: Label@2.5.1
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Stretch
                                                Color: |-
                                                  =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.text)
                                                Font: =Font.'Segoe UI'
                                                FontWeight: =FontWeight.Semibold
                                                Height: =20
                                                Size: =14
                                                Text: =ThisItem.EventTitle
                                          - lblEventDesc:
                                              Control: Label@2.5.1
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Stretch
                                                Color: |-
                                                  =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.textMuted)
                                                Font: =Font.'Segoe UI'
                                                Height: =20
                                                Text: =ThisItem.EventDescription
                                                Wrap: =false
                                          - lblAuthorDate:
                                              Control: Label@2.5.1
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Stretch
                                                Color: |-
                                                  =With({T: If(cmpActivityTimeline.Theme = "Dark", cmpActivityTimeline.ThemeConfig.Dark, cmpActivityTimeline.ThemeConfig.Light)}, T.textSubtle)
                                                Font: =Font.'Segoe UI'
                                                Height: =16
                                                Size: =12
                                                Text: =ThisItem.Author & " · " & ThisItem.DisplayDateTime
                                                Wrap: =false
                                    - imgCardIcon:
                                        Control: Image@2.2.3
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Start
                                          Height: =20
                                          Image: |-
                                            =With(
                                              {_m: Coalesce(
                                                LookUp(cmpActivityTimeline.IconMap, Lower(Category) = Lower(ThisItem.Category)),
                                                LookUp(cmpActivityTimeline.IconMap, Lower(Category) = "default")
                                              )},
                                              "data:image/svg+xml," & EncodeUrl(
                                                Substitute(
                                                  Switch(
                                                    _m.IconType,
