ComponentDefinitions:
  cmpLoadingSpinner:
    DefinitionType: CanvasComponent
    AccessAppScope: true
    CustomProperties:
      LoadingText:
        PropertyKind: Input
        DisplayName: LoadingText
        Description: Message shown below the spinner
        DataType: Text
        Default: ="Loading..."
      OverlayOpacity:
        PropertyKind: Input
        DisplayName: OverlayOpacity
        Description: Background overlay opacity (0 to 1)
        DataType: Number
        Default: =0.3
      ShowBlur:
        PropertyKind: Input
        DisplayName: ShowBlur
        Description: Apply backdrop blur to overlay
        DataType: Boolean
        Default: =true
      Theme:
        PropertyKind: Input
        DisplayName: Theme
        Description: Light or Dark card appearance
        DataType: Text
        Default: ="Light"
    Properties:
      Fill: =Color.Transparent
      Height: =App.Height
      Width: =App.Width
    Children:
      - htmlOverlay:
          Control: HtmlViewer@2.1.0
          Properties:
            DisabledBorderColor: =RGBA(56, 56, 56, 1)
            Font: =Font.'Open Sans'
            Height: =Parent.Height
            HtmlText: |-
              ="<div style='
                  display:block;
                  width:" & Self.Width & "px;
                  height:" & (Self.Height - 1) & "px;
                  background:rgba(0,0,0," & cmpLoadingSpinner.OverlayOpacity & ");
                  " & If(cmpLoadingSpinner.ShowBlur, "backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);", "") & "
              '></div>"
            PaddingBottom: =0
            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            Width: =Parent.Width
      - cntLoadingRoot:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.Bold
            Fill: =Color.Transparent
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            LayoutJustifyContent: =LayoutJustifyContent.Center
            Width: =Parent.Width
          Children:
            - cntSpinnerCard:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Center
                  Fill: =If(cmpLoadingSpinner.Theme = "Dark", RGBA(31, 41, 55, 1), RGBA(255, 255, 255, 1))
                  FillPortions: =0
                  Height: =Max(150, Parent.Height * 0.18)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  LayoutMaxHeight: =Parent.Height * 0.25
                  LayoutMaxWidth: =Parent.Width - 32
                  LayoutMinHeight: =150
                  LayoutMinWidth: =280
                  PaddingBottom: =24
                  PaddingLeft: =24
                  PaddingRight: =24
                  PaddingTop: =24
                  RadiusBottomLeft: =12
                  RadiusBottomRight: =12
                  RadiusTopLeft: =12
                  RadiusTopRight: =12
                  Width: =Min(Max(300, Parent.Width * 0.35), Parent.Width - 32)
                Children:
                  - spnLoading:
                      Control: Spinner@1.4.6
                      Properties:
                        FillPortions: =1
                        Height: =40
                        LayoutMaxHeight: =50
                        LayoutMinHeight: =0
                  - lblLoadingText:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        AlignInContainer: =AlignInContainer.Stretch
                        FontColor: =If(cmpLoadingSpinner.Theme = "Dark", RGBA(249, 250, 251, 1), RGBA(15, 23, 42, 1))
                        Height: =40
                        LayoutMinWidth: =150
                        Size: =18
                        Text: =cmpLoadingSpinner.LoadingText
                        VerticalAlign: =VerticalAlign.Top
                        Weight: ='TextCanvas.Weight'.Semibold
