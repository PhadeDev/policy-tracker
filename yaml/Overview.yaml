Screens:
  Overview:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - conScreen:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 246, 248, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =0
            PaddingBottom: =0
            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            Width: =Parent.Width
          Children:
            - conHeader:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.Semilight
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =68
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingLeft: =14
                  PaddingRight: =14
                Children:
                  - imgLogo:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Fill: =RGBA(0, 64, 47, 1)
                        FillPortions: =0
                        Height: =40
                        Image: |-
                          ="data:image/svg+xml;utf8, "&EncodeUrl("<svg id='Layer_1' data-name='Layer 1' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 154.49 116.84' width='40px' height='40px'><defs><style>.cls-1{fill:#ffffff;}</style></defs><g id='Text_and_Chevron' data-name='Text and Chevron'><path class='cls-1' d='M31.61,116.84c.02-.16.02-.3.02-.43H0c0-13.34,14.15-39.41,25.37-57.98C14.16,39.77,0,13.6,0,.5h31.63c0-.15,0-.32-.02-.5.85,6.6,14.24,31.68,25.74,50.07l5.26,8.41-5.28,8.4c-12.98,20.63-24.99,43.98-25.72,49.97'/><path class='cls-1' d='M77.6,116.84c.02-.16.02-.3.02-.43h-31.63c0-13.34,14.15-39.41,25.37-57.98C60.14,39.77,45.99,13.6,45.99.5h31.63c0-.15,0-.32-.02-.5.85,6.6,14.24,31.68,25.74,50.07l5.26,8.41-5.28,8.4c-12.98,20.63-24.99,43.98-25.72,49.97'/><path class='cls-1' d='M123.5,116.84c.02-.16.02-.3.02-.43h-31.63c0-13.34,14.15-39.41,25.37-57.98C106.04,39.77,91.89,13.6,91.89.5h31.63c0-.15,0-.32-.02-.5.85,6.6,14.24,31.68,25.74,50.07l5.26,8.41-5.28,8.4c-12.98,20.63-24.99,43.98-25.72,49.97'/></g></svg>")
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Width: =46
                  - lblAppTitle:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        FillPortions: =0
                        Font: =Font.'Lato Black'
                        Height: =44
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =20
                        Text: ="Policy Tracker"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =170
                  - badgeVersion:
                      Control: Badge@0.0.24
                      Properties:
                        Appearance: ='BadgeCanvas.Appearance'.Tint
                        Content: ="V3"
                        FillPortions: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Shape: ='BadgeCanvas.Shape'.Rounded
                        ThemeColor: ='BadgeCanvas.ThemeColor'.Success
                        Width: =40
                  - lblPageTitle:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(100, 100, 100, 1)
                        Font: =Font.'Open Sans'
                        FillPortions: =0
                        Height: =44
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =13
                        Text: ="4-week release overview — click any item to open it"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =340
                  - conSpacer:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                  - btnReturn:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(0, 64, 47, 1)
                        BorderThickness: =1
                        Color: =RGBA(0, 64, 47, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Font: =Font.'Open Sans'
                        Height: =36
                        HoverBorderColor: =RGBA(0, 64, 47, 1)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =RGBA(0, 64, 47, 1)
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        OnSelect: =Navigate(Main, ScreenTransition.Fade)
                        PressedBorderColor: =RGBA(0, 64, 47, 1)
                        PressedColor: =RGBA(0, 64, 47, 1)
                        PressedFill: =RGBA(45, 128, 40, 1)
                        RadiusBottomLeft: =6
                        RadiusBottomRight: =6
                        RadiusTopLeft: =6
                        RadiusTopRight: =6
                        Text: ="← Back to Main"
                        Width: =134
            - conKanban:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingBottom: =12
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =12
                Children:
                  - galThursdays:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Horizontal_TwoTextOneImageVariant_ver5.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Fill: =RGBA(245, 246, 248, 1)
                        Items: |-
                          =SortByColumns(
                              GroupBy(
                                  Filter(
                                      'Policy Proof Tracker',
                                      DateValue(PublishDate) >= Today() &&
                                      DateValue(PublishDate) <= Today() + 28
                                  ),
                                  "PublishDate",
                                  "ItemsForDate"
                              ),
                              "PublishDate",
                              SortOrder.Ascending
                          )
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        TemplatePadding: =0
                        TemplateSize: =310
                      Children:
                        - conColumn:
                            Control: GroupContainer@1.5.0
                            Variant: ManualLayout
                            Properties:
                              BorderColor: =RGBA(220, 222, 224, 1)
                              BorderThickness: =1
                              DropShadow: =DropShadow.Regular
                              Fill: =RGBA(255, 255, 255, 1)
                              Height: =Parent.TemplateHeight
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =300
                            Children:
                              - conColumnHeader:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    BorderColor: =RGBA(0, 0, 0, 0)
                                    Fill: =RGBA(0, 64, 47, 1)
                                    Height: =56
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Width: =Parent.Width
                                  Children:
                                    - lblColumnDate:
                                        Control: Label@2.5.1
                                        Properties:
                                          BorderColor: =RGBA(0, 0, 0, 0)
                                          Color: =RGBA(255, 255, 255, 1)
                                          Font: =Font.'Lato Black'
                                          Height: =36
                                          PaddingLeft: =14
                                          Size: =16
                                          Text: =Text(ThisItem.PublishDate, "dd mmm yyyy")
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =220
                                          Y: =10
                                    - badgeCount:
                                        Control: Badge@0.0.24
                                        Properties:
                                          Appearance: ='BadgeCanvas.Appearance'.Filled
                                          Content: =Text(CountRows(ThisItem.ItemsForDate))
                                          Height: =22
                                          Shape: ='BadgeCanvas.Shape'.Circular
                                          ThemeColor: ='BadgeCanvas.ThemeColor'.Warning
                                          Width: =32
                                          X: =258
                                          Y: =17
                              - galColumnItems:
                                  Control: Gallery@2.15.0
                                  Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                                  Properties:
                                    BorderColor: =RGBA(0, 0, 0, 0)
                                    Height: =Parent.Height - 56
                                    Items: |-
                                      =Sort(
                                          ThisItem.ItemsForDate,
                                          TrackerType.Value,
                                          SortOrder.Ascending
                                      )
                                    TemplatePadding: =0
                                    TemplateSize: =62
                                    Width: =Parent.Width
                                    Y: =56
                                  Children:
                                    - conItemRow:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          BorderColor: =RGBA(235, 236, 237, 1)
                                          BorderThickness: =1
                                          DropShadow: =DropShadow.None
                                          Fill: =If(ThisItem.'High Priority', RGBA(255, 248, 240, 1), RGBA(255, 255, 255, 1))
                                          Height: =62
                                          Width: =Parent.TemplateWidth
                                        Children:
                                          - recItemTypeBar:
                                              Control: Rectangle@2.3.0
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                Fill: =LookUp(colChoiceColors, ChoiceValue = ThisItem.'Document Type'.Value, ColorCode)
                                                Height: =62
                                                Width: =4
                                          - lblItemTitle:
                                              Control: Label@2.5.1
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                Color: =RGBA(30, 30, 30, 1)
                                                Font: =Font.'Open Sans'
                                                FontWeight: =FontWeight.Semibold
                                                Height: =32
                                                PaddingLeft: =10
                                                Size: =12
                                                Text: =If(Len(ThisItem.Title) > 32, Left(ThisItem.Title, 29) & "...", ThisItem.Title)
                                                Tooltip: =ThisItem.Title
                                                VerticalAlign: =VerticalAlign.Bottom
                                                Width: =240
                                                X: =4
                                          - badgeItemType:
                                              Control: Badge@0.0.24
                                              Properties:
                                                Appearance: ='BadgeCanvas.Appearance'.Tint
                                                Content: =ThisItem.'Document Type'.Value
                                                Font: =Font.Lato
                                                FontSize: =14
                                                Height: =20
                                                Shape: ='BadgeCanvas.Shape'.Rounded
                                                ThemeColor: |-
                                                  =Switch(
                                                      ThisItem.'Document Type'.Value,
                                                      "📗 Manual",             'BadgeCanvas.ThemeColor'.Success,
                                                      "📄 CFI",                'BadgeCanvas.ThemeColor'.Informative,
                                                      "📄 CFSO",               'BadgeCanvas.ThemeColor'.Important,
                                                      "📕 SOI",                'BadgeCanvas.ThemeColor'.Danger,
                                                      "📖 Regulation",         'BadgeCanvas.ThemeColor'.Brand,
                                                      "📄 CBN",                'BadgeCanvas.ThemeColor'.Severe,
                                                      "📄 ACSO",               'BadgeCanvas.ThemeColor'.Warning,
                                                      "📑 Internal Document",  'BadgeCanvas.ThemeColor'.Severe,
                                                      "📜 Newsletter Item",    'BadgeCanvas.ThemeColor'.Informative,
                                                      'BadgeCanvas.ThemeColor'.Warning
                                                  )
                                                Visible: =!IsBlank(ThisItem.'Document Type'.Value)
                                                Width: =235
                                                X: =4
                                                Y: =36
                                          - lblHighPriority:
                                              Control: Label@2.5.1
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                Color: =RGBA(200, 80, 0, 1)
                                                Font: =Font.'Open Sans'
                                                FontWeight: =FontWeight.Bold
                                                Height: =20
                                                Size: =11
                                                Text: ="⚡"
                                                VerticalAlign: =VerticalAlign.Middle
                                                Visible: =ThisItem.'High Priority'
                                                Width: =22
                                                X: =270
                                                Y: =20
                                          - lblTopItemFlag:
                                              Control: Label@2.5.1
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                Color: =RGBA(180, 120, 0, 1)
                                                Font: =Font.'Open Sans'
                                                FontWeight: =FontWeight.Bold
                                                Height: =20
                                                Size: =11
                                                Text: ="⭐"
                                                VerticalAlign: =VerticalAlign.Middle
                                                Visible: =ThisItem.'Top Item'
                                                Width: =22
                                                X: =270
                                                Y: =38
                                          - btnItemSelect:
                                              Control: Classic/Button@2.2.0
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                BorderThickness: =0
                                                Color: =RGBA(0, 0, 0, 0)
                                                DisabledBorderColor: =RGBA(0, 0, 0, 0)
                                                Fill: =RGBA(0, 0, 0, 0)
                                                Font: =Font.'Open Sans'
                                                Height: =62
                                                HoverBorderColor: =RGBA(0, 0, 0, 0)
                                                HoverColor: =RGBA(0, 0, 0, 0)
                                                HoverFill: =RGBA(0, 64, 47, 0.06)
                                                OnSelect: |-
                                                  =Set(varSelectedRelease, LookUp('Policy Proof Tracker', ID = ThisItem.ID));
                                                  Set(varSelectedItem, varSelectedRelease);
                                                  Set(varSourceScreen, "Overview");
                                                  Set(varSelectPolicy, "Filled");
                                                  Set(varParentSaved, true);
                                                  Set(varSelectedPerson, varSelectedRelease.Owner);
                                                  Set(varScrollDate, Blank());
                                                  Set(varLoadingLinks, true);
                                                  ClearCollect(colLinks, Filter(PolicyLinks, PolicyTrackerSource.Id = varSelectedRelease.ID));
                                                  Set(varLoadingLinks, false);
                                                  Navigate(ViewItem, ScreenTransition.Fade)
                                                PressedBorderColor: =RGBA(0, 0, 0, 0)
                                                PressedColor: =RGBA(0, 0, 0, 0)
                                                PressedFill: =RGBA(0, 64, 47, 0.12)
                                                RadiusBottomLeft: =0
                                                RadiusBottomRight: =0
                                                RadiusTopLeft: =0
                                                RadiusTopRight: =0
                                                Text: =""
                                                Width: =300
