Screens:
  ViewItem:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(
            varOwnerDefault,
            If(
                Form1.Mode = FormMode.New,
                Table({ DisplayName: Office365Users.MyProfileV2().displayName, Mail: User().Email }),
                If(
                    !IsBlank(varSelectedRelease.Owner.DisplayName),
                    Table({ DisplayName: varSelectedRelease.Owner.DisplayName, Mail: varSelectedRelease.Owner.Email }),
                    Blank()
                )
            )
        );
        If(
            !varDeepLinkHandled && !IsBlank(Param("ID")),
            Set(varDeepLinkHandled, true);
            Set(varItemID, Param("ID"));
            Set(varLoading, true);
            Refresh('Policy Proof Tracker');
            Set(varDeepLinkItem, LookUp('Policy Proof Tracker', ID = Value(varItemID)));
            If(
                !IsBlank(varDeepLinkItem),
                Set(varSelectedRelease, varDeepLinkItem);
                Set(varSelectPolicy, "Filled");
                Set(varParentSaved, true);
                Set(varSelectedItem, varDeepLinkItem);
                Set(varSourceScreen, "Main");
                Set(varSelectedPerson, varDeepLinkItem.Owner);
                ClearCollect(colLinks, Filter(PolicyLinks, PolicyTrackerSource.Id = varDeepLinkItem.ID));
                Set(varOwnerDefault, Table({DisplayName: varDeepLinkItem.Owner.DisplayName, Mail: varDeepLinkItem.Owner.Email}))
            );
            Set(varLoading, false)
        )
    Children:
      - TopButtons_1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(237, 237, 237, 1)
            Height: =50
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =10
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =5
            PaddingLeft: =10
            PaddingRight: =10
            PaddingTop: =5
            Width: =Parent.Width
          Children:
            - DuplicateBtn:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  BorderColor: =RGBA(122, 138, 143, 1)
                  BorderThickness: =0.1
                  FillPortions: =0
                  Height: =Parent.Height -10
                  LayoutMinHeight: =Parent.Height - 10
                  LayoutMinWidth: =16
                  Visible: =varSelectPolicy = "Filled"
                  Width: =160
                Children:
                  - 'btnDuplicate:':
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =VerticalAlign.Middle
                        BasePaletteColor: =RGBA(0, 100, 180, 1)
                        Height: =Parent.Height
                        Icon: ="Copy"
                        IconStyle: ='ButtonCanvas.IconStyle'.Filled
                        Layout: ='ButtonCanvas.Layout'.IconAfter
                        OnSelect: |-
                          =ClearCollect(
                              colUpcomingEntries,
                              Filter(
                                  'Policy Proof Tracker',
                                  'Planned Publish Date' >= Today() &&
                                  'Planned Publish Date' <= DateAdd(Today(), 365, "Days")
                              )
                          );
                          Set(
                              varDaysToNextThursday,
                              If(Mod(5 - Weekday(Today()) + 7, 7) = 0, 7, Mod(5 - Weekday(Today()) + 7, 7))
                          );
                          Clear(colThursdays);
                          ForAll(
                              Sequence(52),
                              If(
                                  varSelectedRelease.'High Priority' ||
                                  varDaysToNextThursday + (Value - 1) * 7 >= 10,
                                  With(
                                      {thurDate: DateAdd(Today(), varDaysToNextThursday + (Value - 1) * 7, "Days")},
                                      With(
                                          {
                                              cnt: CountRows(
                                                  Filter(
                                                      colUpcomingEntries,
                                                      Year('Planned Publish Date') = Year(thurDate) &&
                                                      Month('Planned Publish Date') = Month(thurDate) &&
                                                      Day('Planned Publish Date') = Day(thurDate)
                                                  )
                                              )
                                          },
                                          Collect(
                                              colThursdays,
                                              {
                                                  ThursdayDate: thurDate,
                                                  ThursdayLabel: Text(thurDate, "dddd d mmmm yyyy") &
                                                      If(
                                                          cnt = 0, " — clear",
                                                          cnt = 1, " — 1 entry already scheduled",
                                                          " — " & Text(cnt, "0") & " entries already scheduled"
                                                      )
                                              }
                                          )
                                      )
                                  )
                              )
                          );
                          Set(varShowDuplicateModal, true)
                        Text: ="Duplicate"
                        Width: =Parent.Width
            - conFormSubheader:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  Width: =450
                Children:
                  - lblPolicyDetailsTitle:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height
                        Text: ="Policy Details:"
                        X: =12
                  - SVG_11:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 1)
                        Height: =Parent.Height
                        Image: ="data:image/svg+xml;utf8, "&EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' fill='#000000' aria-hidden='true' width='40px' height='40px' viewBox='0 0 20 20'><path d='M7 11a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm1 2a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm2-2a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm1 2a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm2-2a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm4-5.5A2.5 2.5 0 0 0 14.5 3h-9A2.5 2.5 0 0 0 3 5.5v9A2.5 2.5 0 0 0 5.5 17h9a2.5 2.5 0 0 0 2.5-2.5v-9ZM4 7h12v7.5c0 .83-.67 1.5-1.5 1.5h-9A1.5 1.5 0 0 1 4 14.5V7Zm1.5-3h9c.83 0 1.5.67 1.5 1.5V6H4v-.5C4 4.67 4.67 4 5.5 4Z' fill='#000000'/></svg>")
                        Visible: =If(varSelectPolicy="Filled",true, false)
                        Width: =Parent.Height
                        X: =149
                  - lblReleaseDateStatus:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =39
                        Text: |-
                          =If(
                              !varSelectedRelease.Published,
                              With(
                                  { d: DateValue(varSelectedRelease.'Planned Publish Date') },
                                  If(
                                      d = Today(),
                                      "Planned publish date is today",
                                      If(
                                          d > Today(),
                                          DateDiff(Today(), d, TimeUnit.Days) & " days until planned publish date",
                                          "Planned publish date has passed"
                                      )
                                  )
                              ),
                              With(
                                  { d: DateValue(varSelectedRelease.'Planned Publish Date') },
                                  If(
                                      DateDiff(d, Today(), TimeUnit.Days) = 0,
                                      "This was published today",
                                      "This has been published for " & DateDiff(d, Today(), TimeUnit.Days) & " days"
                                  )
                              )
                          )
                        Visible: =If(varSelectPolicy="Filled",true, false)
                        Width: =320
                        X: =192
                  - AnimatedSuccess_1:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Height: =40
                        Image: |
                          ="data:image/svg+xml," & EncodeUrl("
                          <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='40px' height='40px'>
                            <style>
                              .circle" & gblMorphTimestamp & " { fill: #52c41a; stroke: #389e0d; stroke-width: 2; transform-origin: center; animation-name: successBounce; animation-duration: 2000ms; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
                              .checkmark" & gblMorphTimestamp & " { fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12; stroke-dashoffset: 12; animation-name: checkDraw; animation-duration: 2000ms; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
                              @keyframes successBounce { 0%, 70%, 100% { transform: scale(1); } 10% { transform: scale(0.8); } 35% { transform: scale(1.1); } 50% { transform: scale(1); } }
                              @keyframes checkDraw { 0%, 30% { stroke-dashoffset: 12; } 70%, 100% { stroke-dashoffset: 0; } }
                            </style>
                            <circle class='circle" & gblMorphTimestamp & "' cx='12' cy='12' r='6.5' />
                            <path class='checkmark" & gblMorphTimestamp & "' d='M9 12L11 14L15 9.5' />
                          </svg>
                          ")
                        OnSelect: |-
                          =Set(gblMorphToggle, !gblMorphToggle);
                          Set(gblMorphTimestamp, Text(Now(), "yyyymmddhhmmss"))
                        Visible: =varSelectedRelease.Published
                        X: =526
            - Close:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  BorderColor: =RGBA(122, 138, 143, 1)
                  BorderThickness: =0.1
                  FillPortions: =0
                  Height: =Parent.Height -10
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  LayoutMinHeight: =Parent.Height -10
