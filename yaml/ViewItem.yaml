      - WarningBanner10Day:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(255, 200, 0, 1)
            Height: =50
            Visible: |-
              =varSelectPolicy = "Filled" &&
              !IsBlank(Form1.Updates.'Planned Publish Date') &&
              DateDiff(Today(), Form1.Updates.'Planned Publish Date', TimeUnit.Days) >= 0 &&
              DateDiff(Today(), Form1.Updates.'Planned Publish Date', TimeUnit.Days) < 10 &&
              !Form1.Updates.'High Priority' &&
