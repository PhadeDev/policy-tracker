                Children:
                  - btnSaveClose:
                      Control: Button@0.0.45
                      Properties:
                        Align: =Align.Justify
                        Appearance: ='ButtonCanvas.Appearance'.Primary
                        BasePaletteColor: =AppTheme.palette.themePrimary
                        DisplayMode: =If(varSaving, DisplayMode.Disabled, DisplayMode.Edit)
                        Font: =Font.'Open Sans'
                        Height: =Parent.Height
                        Icon: ="Save"
                        IconStyle: ='ButtonCanvas.IconStyle'.Filled
                        Layout: ='ButtonCanvas.Layout'.IconAfter
                        OnSelect: |-
                          =If( !varSaving,
                              Set(varSaving, true);
                              Set(varSaveMode, "Close");
                              If(
                                  !IsBlank(Form1.Updates.'Planned Publish Date') &&
                                  DateDiff(Today(), Form1.Updates.'Planned Publish Date', TimeUnit.Days) >= 0 &&
                                  DateDiff(Today(), Form1.Updates.'Planned Publish Date', TimeUnit.Days) < 10 &&
                                  !Form1.Updates.'High Priority' &&
                                  (
                                      Form1.Mode = FormMode.New ||
                                      Form1.Updates.'Planned Publish Date' <> varSelectedRelease.'Planned Publish Date'
                                  ),
                                  Set(varSaving, false);
                                  Notify(
                                      "Release date is within 10 days. Tick High Priority to override, or pick a later date.",
                                      NotificationType.Warning
                                  ),
                                  SubmitForm(Form1)
                              )
                          )
                        Text: ="Save & Close"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =Parent.Width
