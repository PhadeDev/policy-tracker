                  RadiusTopLeft: =6
                  RadiusTopRight: =6
                  Size: =10
                  Text: ="Main"
                  Width: =80
                  X: =Parent.Width - 620
                  Y: =10
            - btnDuplicate:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =RGBA(36, 100, 70, 1)
                  BorderThickness: =1
                  Color: =RGBA(255, 255, 255, 1)
                  Fill: =RGBA(46, 125, 89, 1)
                  Font: =Font.'Courier New'
                  FontWeight: =FontWeight.Bold
                  Height: =36
                  HoverFill: =RGBA(36, 100, 70, 1)
                  OnSelect: |-
                    =ClearCollect(
                        colUpcomingEntries,
                        Filter(
                            'Policy Proof Tracker',
                            'Planned Publish Date' >= Today() &&
                            'Planned Publish Date' <= DateAdd(Today(), 365, "Days")
                        )
                    );
                    Set(
                        varDaysToNextThursday,
                        If(Mod(5 - Weekday(Today()) + 7, 7) = 0, 7, Mod(5 - Weekday(Today()) + 7, 7))
                    );
                    Clear(colThursdays);
                    ForAll(
                        Sequence(52),
                        If(
                            varSelectedRelease.'High Priority' ||
                            varDaysToNextThursday + (Value - 1) * 7 >= 10,
                            With(
                                {thurDate: DateAdd(Today(), varDaysToNextThursday + (Value - 1) * 7, "Days")},
                                With(
                                    {
                                        cnt: CountRows(
                                            Filter(
                                                colUpcomingEntries,
                                                Year('Planned Publish Date') = Year(thurDate) &&
                                                Month('Planned Publish Date') = Month(thurDate) &&
                                                Day('Planned Publish Date') = Day(thurDate)
                                            )
                                        )
                                    },
                                    Collect(
                                        colThursdays,
                                        {
                                            ThursdayDate: thurDate,
                                            ThursdayLabel: Text(thurDate, "dddd d mmmm yyyy") &
                                                If(
                                                    cnt = 0, " — clear",
                                                    cnt = 1, " — 1 entry already scheduled",
                                                    " — " & Text(cnt, "0") & " entries already scheduled"
                                                )
                                        }
                                    )
                                )
                            )
                        )
                    );
                    Set(varShowDuplicateModal, true)
                  PressedFill: =RGBA(28, 80, 55, 1)
                  RadiusBottomLeft: =6
                  RadiusBottomRight: =6
                  RadiusTopLeft: =6
                  RadiusTopRight: =6
                  Size: =10
                  Text: ="Duplicate"
                  Visible: =varSelectPolicy = "Filled"
                  Width: =105
                  X: =Parent.Width - 518
                  Y: =10
            - btnSave:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =RGBA(36, 100, 70, 1)
                  BorderThickness: =1
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(100, 120, 100, 1)
                  DisabledColor: =RGBA(180, 200, 180, 1)
                  DisabledFill: =RGBA(38, 80, 55, 1)
                  Fill: =RGBA(46, 125, 89, 1)
                  Font: =Font.'Courier New'
                  FontWeight: =FontWeight.Bold
                  Height: =36
                  HoverFill: =RGBA(36, 100, 70, 1)
                  OnSelect: |-
                    =If(!varSaving,
                        Set(varSaving, true);
                        Set(varSaveMode, "Stay");
                        If(
                            !IsBlank(Form1.Updates.'Planned Publish Date') &&
                            DateDiff(Today(), Form1.Updates.'Planned Publish Date', "Days") >= 0 &&
                            DateDiff(Today(), Form1.Updates.'Planned Publish Date', "Days") < 10 &&
                            !Form1.Updates.'High Priority' &&
                            (
                                Form1.Mode = FormMode.New ||
                                Form1.Updates.'Planned Publish Date' <> varSelectedRelease.'Planned Publish Date'
                            ),
                            Set(varSaving, false);
                            Notify(
                                "Release date is within 10 days. Tick High Priority to override, or pick a later date.",
                                NotificationType.Warning
                            ),
                            SubmitForm(Form1)
                        )
                    )
                  DisplayMode: =If(varSaving, DisplayMode.Disabled, DisplayMode.Edit)
                  PressedFill: =RGBA(28, 80, 55, 1)
                  RadiusBottomLeft: =6
                  RadiusBottomRight: =6
                  RadiusTopLeft: =6
                  RadiusTopRight: =6
                  Size: =10
                  Text: =If(varSaving && varSaveMode = "Stay", "Saving...", "Save")
                  Width: =80
                  X: =Parent.Width - 405
                  Y: =10
            - btnSaveClose:
