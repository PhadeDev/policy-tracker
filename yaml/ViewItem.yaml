                                NotificationType.Warning
                            ),
                            SubmitForm(Form1)
                        )
                    )
                  DisplayMode: =If(varSaving, DisplayMode.Disabled, DisplayMode.Edit)
                  PressedFill: =RGBA(28, 80, 55, 1)
                  RadiusBottomLeft: =6
                  RadiusBottomRight: =6
                  RadiusTopLeft: =6
                  RadiusTopRight: =6
                  Size: =10
