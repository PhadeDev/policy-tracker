                  Height: =3000
                  Item: =LookUp('Policy Proof Tracker', ID = varSelectedRelease.ID)
                  NumberOfColumns: =2
                  AlignInContainer: =AlignInContainer.Stretch
                  OnFailure: |-
                    =Notify(
                        "Save failed: " & Coalesce(Form1.Error, "Unknown error. Please check your connection."),
                        NotificationType.Error
                    );
                    Set(varSaving, false);
                  OnSuccess: |-
                    =Set(varSaving, false);
                    Set(varSelectedRelease, Form1.LastSubmit);
                    Set(varParentSaved, true);
                    Set(varFormSaved, true);
                    ClearCollect(colUnpublishedPolicies, Filter('Policy Proof Tracker', Published = false));
                    Notify("Saved successfully!", NotificationType.Success);
                    ResetForm(Form1);
                    Set(varSelectPolicy, "Empty");
                    Set(varUnsavedChanges, false);
                    Set(varShowLinkModal, false);
