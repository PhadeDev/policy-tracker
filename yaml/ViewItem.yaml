                              FillPortions: =1
                              Size: =24
                              Text: ="Delete"
                              Weight: ='TextCanvas.Weight'.Semibold
                        - btnCloseModal1:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Subtle
                              Icon: ="Dismiss"
                              Layout: ='ButtonCanvas.Layout'.IconOnly
                              OnSelect: |-
                                =UpdateContext({locDisplayDeletePopUp1: false})
                              Width: =30
                  - txtModalText1:
                      Control: Text@0.0.51
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        FillPortions: =1
                        PaddingLeft: =24
                        PaddingRight: =24
                        Size: =20
                        Text: ="Are you sure you want to proceed with deleting this item? This action cannot be undone."
                  - conFooterPopUp1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =80
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutJustifyContent: =LayoutJustifyContent.End
                        PaddingLeft: =24
                        PaddingRight: =24
                      Children:
                        - btnCancelModal1:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Outline
                              OnSelect: |-
                                =UpdateContext({locDisplayDeletePopUp1: false})
                              Text: ="Cancel"
                        - btnModalAction1:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =RGBA(249, 83, 109, 1)
                              DisplayMode: =If(varDeletingItem, DisplayMode.Disabled, DisplayMode.Edit)
                              OnSelect: |-
                                =Set(varDeletingItem, true);
                                IfError(
                                    Remove('Policy Proof Tracker', varSelectedRelease),
                                    Set(varDeletingItem, false);
                                    UpdateContext({locDisplayDeletePopUp1: false});
                                    Notify("Delete failed. The item may still exist. Please check and try again.", NotificationType.Error),
                                    UpdateContext({locDisplayDeletePopUp1: false});
                                    ClearCollect(colUnpublishedPolicies, Filter('Policy Proof Tracker', Published = false));
                                    Notify("Item deleted successfully.", NotificationType.Success);
                                    Set(varSelectedRelease, Blank());
                                    Set(varDeletingItem, false);
                                    Navigate(Main, ScreenTransition.Fade)
                                )
                              Text: ="Delete"
