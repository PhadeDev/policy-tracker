Screens:
  ViewItem:
    Properties:
      Fill: =RGBA(244, 246, 243, 1)
      LoadingSpinnerColor: =RGBA(11, 74, 54, 1)
      OnVisible: |-
        =Set(varLoadingLinks, varLinksSourceID <> varSelectedRelease.ID || IsBlank(varSelectedRelease.ID));
        Set(varSaving, false);
        Set(varShowLinkModal, false);
        Set(varSelectedLink, Blank());
        Set(varErrTitle, false);
        Set(varErrOwner, false);
        Set(varErrDocType, false);
        Set(varErrPublishDate, false);
        Set(
            varOwnerDefault,
            If(
                IsBlank(varSelectedRelease) || IsBlank(varSelectedRelease.Owner.Email),
                Table({DisplayName: User().FullName, Mail: User().Email}),
                Table({DisplayName: varSelectedRelease.Owner.DisplayName, Mail: varSelectedRelease.Owner.Email})
            )
        );
        Set(
            varPlannedPublishDate,
            If(
                IsBlank(varSelectedRelease) || IsBlank(varSelectedRelease.'Planned Publish Date'),
                DateAdd(Today(), Mod(5 - Weekday(Today()) + 7, 7), "Days"),
                varSelectedRelease.'Planned Publish Date'
            )
        );
        If(
            !varDeepLinkHandled && !IsBlank(Param("ID")),
            Set(varDeepLinkHandled, true);
            Set(varItemID, Param("ID"));
            Set(varLoading, true);
            Refresh('Policy Proof Tracker');
            Set(varDeepLinkItem, LookUp('Policy Proof Tracker', ID = Value(varItemID)));
            If(
                !IsBlank(varDeepLinkItem),
                Set(varSelectedRelease, varDeepLinkItem);
                Set(varSelectPolicy, "Filled");
                Set(varParentSaved, true);
                Set(varSelectedItem, varDeepLinkItem);
                Set(varSourceScreen, "Main");
                Set(varSelectedPerson, varDeepLinkItem.Owner);
                Refresh(PolicyLinks);
                BuildLinksForSource(varDeepLinkItem.ID);
                Set(varOwnerDefault, Table({DisplayName: varDeepLinkItem.Owner.DisplayName, Mail: varDeepLinkItem.Owner.Email}));
                Set(varPlannedPublishDate, varDeepLinkItem.'Planned Publish Date'),
                Notify("This item could not be found. It may have been deleted or the link may be incorrect.", NotificationType.Error);
                Set(varDeepLinkNotFound, true)
            );
            Set(varLoading, false)
        );
        Reset(txtTitle1);
        Reset(drpDocType1);
        Reset(dpkPublishDate1);
        Reset(cmb_Owner1);
        Reset(ckbHighPriority1);
        Reset(txtReasonHighPri1);
        Reset(ckbExtConsult1);
        Reset(txtExtConsultDetails1);
        Reset(ckbTopItem1);
        Reset(txtNewsletterTitle1);
        Reset(txtAudience1);
        Reset(txtSummary1);
        Reset(txtRemarks1);
        Reset(ckbPillarLead1);
        Reset(radApproval1);
        Reset(ckbPublished1);
        Reset(dpkPublishedDate1);
        Set(varShowThursdayPicker, false);
        ClearCollect(
            colThursdayItemCounts,
            AddColumns(
                GroupBy(
                    AddColumns(
                        Filter(
                            'Policy Proof Tracker',
                            'Planned Publish Date' >= Today() &&
                            'Planned Publish Date' <= DateAdd(Today(), 104 * 7, "Days")
                        ),
                        GroupDate, 'Planned Publish Date'
                    ),
                    GroupDate,
                    GroupedItems
                ),
                DayItemCount,
                CountRows(GroupedItems)
            )
        );
        ClearCollect(
            colThursdayOptions,
            ForAll(
                Sequence(104),
                With(
                    {_thu: DateAdd(Today(), Mod(5 - Weekday(Today()) + 7, 7) + (Value - 1) * 7, "Days")},
                    {
                        ThursdayDate: _thu,
                        ItemCount: Coalesce(LookUp(colThursdayItemCounts, GroupDate = _thu, DayItemCount), 0)
                    }
                )
            )
        );
        If(
            !IsBlank(varSelectedRelease.ID),
            If(
                !IsBlank(LookUp(colActiveItems, ID = varSelectedRelease.ID)),
                ClearCollect(colLinks, Filter(colActiveLinks, PolicyTrackerSource.Id = varSelectedRelease.ID));
                Set(varLinksSourceID, varSelectedRelease.ID),
                If(
                    varLinksSourceID <> varSelectedRelease.ID,
                    BuildLinksForSource(varSelectedRelease.ID)
                )
            );
            Set(varLoadingLinks, false),
            Clear(colLinks);
            Set(varLoadingLinks, false)
        );
    Children:
      - conScreen1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(244, 246, 243, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =12
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - conTopBar1:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =64
                  RadiusBottomLeft: =14
                  RadiusBottomRight: =14
                  RadiusTopLeft: =14
                  RadiusTopRight: =14
                  Visible: |-
                    =!(
                        varSelectPolicy <> "Filled" &&
                        DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") >= 0 &&
                        DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") < 10 &&
                        !ckbHighPriority1.Value &&
                        !ckbExtConsult1.Value
                    )
                Children:
                  - lblAppTitle1:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(22, 33, 28, 1)
                        Font: =Font.'Lato Black'
                        Height: =64
                        Size: =15
                        Text: ="Policy Tracker"
                        X: =18
                  - badgeHighPriority1:
                      Control: ModernText@1.0.0
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(168, 114, 10, 1)
                        Fill: =RGBA(255, 242, 204, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                        Size: =13
                        Text: |-
                          ="🚩 High Priority"
                        Visible: =ckbHighPriority1.Value
                        Width: =220
                        X: =191
                        Y: =16
                  - badgeTopItem1:
                      Control: ModernText@1.0.0
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(168, 114, 10, 1)
                        Fill: =RGBA(255, 242, 204, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                        Size: =13
                        Text: |-
                          ="📰 Top Newsletter Item"
                        Visible: =ckbTopItem1.Value
                        Width: =220
                        X: =435
                        Y: =16
                  - btnSaveClose1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(11, 74, 54, 1)
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(100, 120, 100, 1)
                        DisabledColor: =RGBA(180, 200, 180, 1)
                        DisabledFill: =RGBA(38, 80, 55, 1)
                        DisplayMode: =If(varSaving, DisplayMode.Disabled, DisplayMode.Edit)
                        Fill: =RGBA(11, 74, 54, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        HoverFill: =RGBA(9, 60, 44, 1)
                        OnSelect: |-
                          =Set(varErrTitle, IsBlank(Trim(txtTitle1.Text)));
                          Set(varErrOwner, IsBlank(cmb_Owner1.Selected.Mail));
                          Set(varErrDocType, IsBlank(drpDocType1.Selected.Value));
                          Set(varErrPublishDate, IsBlank(dpkPublishDate1.SelectedDate) || Weekday(dpkPublishDate1.SelectedDate, StartOfWeek.Monday) <> 4);
                          If(
                              varErrTitle || varErrOwner || varErrDocType || varErrPublishDate,
                              false,
                              If(
                                  varSelectPolicy <> "Filled" &&
                                  !IsBlank(dpkPublishDate1.SelectedDate) &&
                                  DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") >= 0 &&
                                  DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") < 10 &&
                                  !ckbHighPriority1.Value,
                                  Notify("Release date is within 10 days. Tick High Priority to override, or pick a later date.", NotificationType.Warning),
                                  Set(varSaving, true);
                                  Set(
                                      varSavedRecord,
                                      Patch(
                                          'Policy Proof Tracker',
                                          If(IsBlank(varSelectedRelease.ID), Defaults('Policy Proof Tracker'), varSelectedRelease),
                                          {
                                              Title: Trim(txtTitle1.Text),
                                              'Document Type': {Value: drpDocType1.Selected.Value},
                                              Owner: {
                                                  Claims: "i:0#.f|membership|" & cmb_Owner1.Selected.Mail,
                                                  Department: "",
                                                  DisplayName: cmb_Owner1.Selected.DisplayName,
                                                  Email: cmb_Owner1.Selected.Mail,
                                                  JobTitle: "",
                                                  Picture: ""
                                              },
                                              'Planned Publish Date': dpkPublishDate1.SelectedDate,
                                              'High Priority': ckbHighPriority1.Value,
                                              'Reason for High Priority': txtReasonHighPri1.Text,
                                              'External consultation required': ckbExtConsult1.Value,
                                              'External consultation details': txtExtConsultDetails1.Text,
                                              'Top Item': ckbTopItem1.Value,
                                              'Title for Newsletter': txtNewsletterTitle1.Text,
                                              Audience: txtAudience1.Text,
                                              'Item summary': txtSummary1.Text,
                                              Remarks: txtRemarks1.Text,
                                              'Approved by Pillar Lead (Ready to Release)': ckbPillarLead1.Value,
                                              'Approved For Release By': {Value: Coalesce(radApproval1.Selected.Value, "Not Yet Approved")},
                                              Published: ckbPublished1.Value,
                                              'Published Date': If(ckbPublished1.Value, Coalesce(dpkPublishedDate1.SelectedDate, Today()), Blank())
                                          }
                                      )
                                  );
                                  If(
                                      IsEmpty(Errors('Policy Proof Tracker')),
                                      Set(varSelectedRelease, varSavedRecord);
                                      Set(varSelectedItem, varSavedRecord);
                                      Set(varSelectPolicy, "Filled");
                                      Set(varOwnerDefault, Table({DisplayName: cmb_Owner1.Selected.DisplayName, Mail: cmb_Owner1.Selected.Mail}));
                                      Set(varParentSaved, true);
                                      Set(varUnsavedChanges, false);
                                      ClearCollect(colUnpublishedPolicies, Filter('Policy Proof Tracker', Published = false));
                                      ClearCollect(colLinks, AddColumns(Filter(PolicyLinks, PolicyTrackerSource.Id = varSavedRecord.ID), FileExt, GetFileExt(LinkUrl)));
                                      Set(varErrTitle, false);
                                      Set(varErrOwner, false);
                                      Set(varErrDocType, false);
                                      Set(varErrPublishDate, false);
                                      Set(varSaving, false);
                                      Notify("Saved successfully!", NotificationType.Success);
                                      If(varSourceScreen = "Historic", Navigate(Historic, ScreenTransition.Fade), Navigate(Main, ScreenTransition.Fade)),
                                      Set(varSaving, false);
                                      Notify("Save failed. Please check your connection and try again.", NotificationType.Error)
                                  )
                              )
                          )
                        PressedFill: =RGBA(7, 48, 36, 1)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: =If(varSaving, "Saving...", "Save & Close")
                        Width: =150
                        X: =Parent.Width - 474
                        Y: =13
                  - btnSave1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(11, 74, 54, 1)
                        BorderThickness: =1
                        Color: =RGBA(11, 74, 54, 1)
                        DisabledBorderColor: =RGBA(180, 200, 180, 1)
                        DisabledColor: =RGBA(180, 200, 180, 1)
                        DisplayMode: =If(varSaving, DisplayMode.Disabled, DisplayMode.Edit)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        HoverFill: =RGBA(227, 239, 232, 1)
                        OnSelect: |-
                          =Set(varErrTitle, IsBlank(Trim(txtTitle1.Text)));
                          Set(varErrOwner, IsBlank(cmb_Owner1.Selected.Mail));
                          Set(varErrDocType, IsBlank(drpDocType1.Selected.Value));
                          Set(varErrPublishDate, IsBlank(dpkPublishDate1.SelectedDate) || Weekday(dpkPublishDate1.SelectedDate, StartOfWeek.Monday) <> 4);
                          If(
                              varErrTitle || varErrOwner || varErrDocType || varErrPublishDate,
                              false,
                              If(
                                  varSelectPolicy <> "Filled" &&
                                  !IsBlank(dpkPublishDate1.SelectedDate) &&
                                  DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") >= 0 &&
                                  DateDiff(Today(), dpkPublishDate1.SelectedDate, "Days") < 10 &&
                                  !ckbHighPriority1.Value,
                                  Notify("Release date is within 10 days. Tick High Priority to override, or pick a later date.", NotificationType.Warning),
                                  Set(varSaving, true);
                                  Set(
                                      varSavedRecord,
                                      Patch(
                                          'Policy Proof Tracker',
                                          If(IsBlank(varSelectedRelease.ID), Defaults('Policy Proof Tracker'), varSelectedRelease),
                                          {
                                              Title: Trim(txtTitle1.Text),
                                              'Document Type': {Value: drpDocType1.Selected.Value},
                                              Owner: {
                                                  Claims: "i:0#.f|membership|" & cmb_Owner1.Selected.Mail,
                                                  Department: "",
                                                  DisplayName: cmb_Owner1.Selected.DisplayName,
                                                  Email: cmb_Owner1.Selected.Mail,
                                                  JobTitle: "",
                                                  Picture: ""
                                              },
                                              'Planned Publish Date': dpkPublishDate1.SelectedDate,
                                              'High Priority': ckbHighPriority1.Value,
                                              'Reason for High Priority': txtReasonHighPri1.Text,
                                              'External consultation required': ckbExtConsult1.Value,
                                              'External consultation details': txtExtConsultDetails1.Text,
                                              'Top Item': ckbTopItem1.Value,
                                              'Title for Newsletter': txtNewsletterTitle1.Text,
                                              Audience: txtAudience1.Text,
                                              'Item summary': txtSummary1.Text,
                                              Remarks: txtRemarks1.Text,
                                              'Approved by Pillar Lead (Ready to Release)': ckbPillarLead1.Value,
                                              'Approved For Release By': {Value: Coalesce(radApproval1.Selected.Value, "Not Yet Approved")},
                                              Published: ckbPublished1.Value,
                                              'Published Date': If(ckbPublished1.Value, Coalesce(dpkPublishedDate1.SelectedDate, Today()), Blank())
                                          }
                                      )
                                  );
                                  If(
                                      IsEmpty(Errors('Policy Proof Tracker')),
                                      Set(varSelectedRelease, varSavedRecord);
                                      Set(varSelectedItem, varSavedRecord);
                                      Set(varSelectPolicy, "Filled");
                                      Set(varOwnerDefault, Table({DisplayName: cmb_Owner1.Selected.DisplayName, Mail: cmb_Owner1.Selected.Mail}));
                                      Set(varParentSaved, true);
                                      Set(varUnsavedChanges, false);
                                      ClearCollect(colUnpublishedPolicies, Filter('Policy Proof Tracker', Published = false));
                                      ClearCollect(colLinks, AddColumns(Filter(PolicyLinks, PolicyTrackerSource.Id = varSavedRecord.ID), FileExt, GetFileExt(LinkUrl)));
                                      Set(varErrTitle, false);
                                      Set(varErrOwner, false);
                                      Set(varErrDocType, false);
                                      Set(varErrPublishDate, false);
                                      Notify("Saved successfully!", NotificationType.Success),
                                      Notify("Save failed. Please check your connection and try again.", NotificationType.Error)
                                  );
                                  Set(varSaving, false)
                              )
                          )
                        PressedBorderColor: =RGBA(11, 74, 54, 1)
                        PressedColor: =RGBA(11, 74, 54, 1)
                        PressedFill: =ColorFade(RGBA(227, 239, 232, 1), -15%)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: =If(varSaving, "Saving...", "Save")
                        Width: =90
                        X: =Parent.Width - 312
                        Y: =13
                  - btnDelete1:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(163, 45, 45, 1)
                        Height: =38
                        Icon: ="Delete"
                        OnSelect: |-
                          =UpdateContext({locDisplayDeletePopUp1: true})
                        Text: =""
                        Visible: =varSelectPolicy = "Filled"
                        Width: =38
                        X: =Parent.Width - 210
                        Y: =13
                  - btnClose1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(223, 229, 224, 1)
                        BorderThickness: =1
                        Color: =RGBA(91, 105, 97, 1)
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =38
                        HoverColor: =RGBA(91, 105, 97, 1)
                        HoverFill: =RGBA(227, 239, 232, 1)
                        OnSelect: |-
                          =If(
                              varUnsavedChanges,
                              UpdateContext({locDisplayDiscardPopUp: true}),
                              Set(varSelectPolicy, "Empty");
                              Set(varSelectedRelease, Blank());
                              Set(varUnsavedChanges, false);
                              Set(varShowLinkModal, false);
                              If(varSourceScreen = "Historic", Navigate(Historic, ScreenTransition.Fade), Navigate(Main, ScreenTransition.Fade))
                          )
                        PressedBorderColor: =RGBA(223, 229, 224, 1)
                        PressedColor: =RGBA(91, 105, 97, 1)
                        PressedFill: =ColorFade(RGBA(227, 239, 232, 1), -15%)
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Size: =11
                        Text: ="Close"
                        Width: =90
                        X: =Parent.Width - 110
                        Y: =13
                  - btnDuplicate1:
                      Control: ModernButton@1.0.0
                      Properties:
                        AccessibleLabel: ="Duplicate entry"
                        Align: =Align.Center
                        BasePaletteColor: =RGBA(11, 74, 54, 1)
                        FontWeight: =""
                        Height: =38
                        Icon: ="Copy"
                        OnSelect: |-
                          =ClearCollect(
                              colUpcomingEntries,
                              AddColumns(
                                  Filter(
                                      'Policy Proof Tracker',
                                      'Planned Publish Date' >= Today() &&
                                      'Planned Publish Date' <= DateAdd(Today(), 365, "Days")
                                  ),
                                  EntryDateKey,
                                  Date(Year('Planned Publish Date'), Month('Planned Publish Date'), Day('Planned Publish Date'))
                              )
                          );
                          Set(
                              varDaysToNextThursday,
                              If(Mod(5 - Weekday(Today()) + 7, 7) = 0, 7, Mod(5 - Weekday(Today()) + 7, 7))
                          );
                          ClearCollect(
                              colUpcomingCounts,
                              GroupBy(colUpcomingEntries, EntryDateKey, GroupedEntries)
                          );
                          Clear(colThursdays);
                          ForAll(
                              Sequence(52),
                              If(
                                  varSelectedRelease.'High Priority' ||
                                  varDaysToNextThursday + (Value - 1) * 7 >= 10,
                                  With(
                                      {thurDate: DateAdd(Today(), varDaysToNextThursday + (Value - 1) * 7, "Days")},
                                      With(
                                          {matchedGroup: LookUp(colUpcomingCounts, EntryDateKey = thurDate)},
                                          With(
                                              {cnt: If(IsBlank(matchedGroup), 0, CountRows(matchedGroup.GroupedEntries))},
                                              Collect(
                                                  colThursdays,
                                                  {
                                                      ThursdayDate: thurDate,
                                                      ThursdayLabel: Text(thurDate, "dddd d mmmm yyyy") &
                                                          If(
                                                              cnt = 0, " - clear",
                                                              cnt = 1, " - 1 entry already scheduled",
                                                              " - " & Text(cnt, "0") & " entries already scheduled"
                                                          ),
                                                      ItemCount: cnt
                                                  }
                                              )
                                          )
                                      )
                                  )
                              )
                          );
                          Set(varSelectedDuplicateDate, First(colThursdays).ThursdayDate);
                          Set(varShowDuplicateModal1, true)
                        PaddingBottom: =5
                        PaddingLeft: =12
                        PaddingRight: =12
                        PaddingTop: =5
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        Text: =""
                        Tooltip: ="Duplicate Entry"
                        Width: =38
                        X: =1174
                        Y: =13
