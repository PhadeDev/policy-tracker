                              Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                              Width: =30
                              Wrap: =false
                              Y: =DataCardValue2_1.Y
                        - DataCardValue2_1:
                            Control: Classic/CheckBox@2.1.0
