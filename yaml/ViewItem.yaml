Screens:
  ViewItem:
    Properties:
      LoadingSpinnerColor: =RGBA(46, 125, 89, 1)
      OnVisible: |-
        =Set(
            varOwnerDefault,
            If(
                IsBlank(varSelectedRelease),
                Table({DisplayName: Office365Users.MyProfileV2().displayName, Mail: User().Email}),
                If(
                    !IsBlank(varSelectedRelease.Owner.DisplayName),
                    Table({DisplayName: varSelectedRelease.Owner.DisplayName, Mail: varSelectedRelease.Owner.Email}),
                    Blank()
                )
            )
        );
        If(
            !varDeepLinkHandled && !IsBlank(Param("ID")),
            Set(varDeepLinkHandled, true);
            Set(varItemID, Param("ID"));
            Set(varLoading, true);
            Refresh('Policy Proof Tracker');
            Set(varDeepLinkItem, LookUp('Policy Proof Tracker', ID = Value(varItemID)));
            If(
                !IsBlank(varDeepLinkItem),
                Set(varSelectedRelease, varDeepLinkItem);
                Set(varSelectPolicy, "Filled");
                Set(varParentSaved, true);
                Set(varSelectedItem, varDeepLinkItem);
                Set(varSourceScreen, "Main");
                Set(varSelectedPerson, varDeepLinkItem.Owner);
                ClearCollect(colLinks, Filter(PolicyLinks, PolicyTrackerSource.Id = varDeepLinkItem.ID));
                Set(varOwnerDefault, Table({DisplayName: varDeepLinkItem.Owner.DisplayName, Mail: varDeepLinkItem.Owner.Email}))
            );
            Set(varLoading, false)
        )
    Children:
      - conHeader:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(28, 32, 48, 1)
            Height: =56
            Width: =Parent.Width
            X: =0
            Y: =0
          Children:
            - imgLogo:
                Control: Image@2.2.3
                Properties:
                  Height: =36
                  Image: |-
                    ="data:image/svg+xml;utf8, "&EncodeUrl("<svg id='Layer_1' data-name='Layer 1' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 154.49 116.84' width='36px' height='36px'><defs><style>.cls-1{fill:#00402f;}</style></defs><g id='Text_and_Chevron' data-name='Text and Chevron'><path class='cls-1' d='M31.61,116.84c.02-.16.02-.3.02-.43H0c0-13.34,14.15-39.41,25.37-57.98C14.16,39.77,0,13.6,0,.5h31.63c0-.15,0-.32-.02-.5.85,6.6,14.24,31.68,25.74,50.07l5.26,8.41-5.28,8.4c-12.98,20.63-24.99,43.98-25.72,49.97'/><path class='cls-1' d='M77.6,116.84c.02-.16.02-.3.02-.43h-31.63c0-13.34,14.15-39.41,25.37-57.98C60.14,39.77,45.99,13.6,45.99.5h31.63c0-.15,0-.32-.02-.5.85,6.6,14.24,31.68,25.74,50.07l5.26,8.41-5.28,8.4c-12.98,20.63-24.99,43.98-25.72,49.97'/><path class='cls-1' d='M123.5,116.84c.02-.16.02-.3.02-.43h-31.63c0-13.34,14.15-39.41,25.37-57.98C106.04,39.77,91.89,13.6,91.89.5h31.63c0-.15,0-.32-.02-.5.85,6.6,14.24,31.68,25.74,50.07l5.26,8.41-5.28,8.4c-12.98,20.63-24.99,43.98-25.72,49.97'/></g></svg>")
                  ImagePosition: =ImagePosition.Fit
                  Width: =36
                  X: =12
                  Y: =10
            - lblAppTitle:
                Control: Label@2.5.1
