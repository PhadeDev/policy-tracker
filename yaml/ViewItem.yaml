            - lblDateStatus:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Right
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Color: |-
                    =If(
                        IsBlank(varSelectedRelease),
                        RGBA(150, 150, 150, 1),
                        If(
                            varSelectedRelease.Published,
                            RGBA(100, 110, 140, 1),
                            If(
                                IsBlank(varSelectedRelease.'Planned Publish Date'),
                                RGBA(150, 150, 150, 1),
                                If(
                                    DateDiff(Today(), DateValue(varSelectedRelease.'Planned Publish Date'), "Days") < 0,
                                    RGBA(200, 72, 50, 1),
                                    If(
                                        DateDiff(Today(), DateValue(varSelectedRelease.'Planned Publish Date'), "Days") <= 7,
                                        RGBA(191, 150, 50, 1),
                                        RGBA(46, 140, 100, 1)
                                    )
                                )
                            )
                        )
                    )
                  Font: =Font.'Courier New'
                  Height: =51
                  Size: =10
                  Text: |-
                    =If(
                        IsBlank(varSelectedRelease),
                        "",
                        If(
                            varSelectedRelease.Published,
                            "Published " & Text(varSelectedRelease.'Planned Publish Date', "d mmm yyyy"),
                            If(
                                IsBlank(varSelectedRelease.'Planned Publish Date'),
                                "No date set",
                                With(
                                    {d: DateValue(varSelectedRelease.'Planned Publish Date')},
                                    If(
                                        d = Today(), "Due today",
                                        d < Today(), "Overdue — " & Text(d, "d mmm yyyy"),
                                        DateDiff(Today(), d, "Days") & " days — " & Text(d, "d mmm yyyy")
                                    )
                                )
