                        Fill: =If(ckbPillarLead1.Value && radApproval1.Selected.Value <> "Not Yet Approved" && !IsBlank(radApproval1.Selected.Value) && ckbPublished1.Value, RGBA(159, 224, 189, 1), If(radApproval1.Selected.Value <> "Not Yet Approved" && !IsBlank(radApproval1.Selected.Value), RGBA(11, 74, 54, 1), RGBA(223, 229, 224, 1)))
                        Height: =3
                        Width: =90
                        X: =Parent.Width / 2 + 14
                        Y: =21
                  - compactDot1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderThickness: =0
                        DisplayMode: =DisplayMode.View
                        Fill: =If(ckbPillarLead1.Value && radApproval1.Selected.Value <> "Not Yet Approved" && !IsBlank(radApproval1.Selected.Value) && ckbPublished1.Value, RGBA(159, 224, 189, 1), If(ckbPillarLead1.Value, RGBA(11, 74, 54, 1), If(radApproval1.Selected.Value <> "Not Yet Approved" && !IsBlank(radApproval1.Selected.Value) || ckbPublished1.Value, RGBA(226, 150, 60, 1), RGBA(223, 229, 224, 1))))
                        Height: =14
