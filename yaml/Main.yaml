                      Children:
                        - lblEmptyState:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Color: =RGBA(112, 116, 134, 1)
                              Font: =Font.'Open Sans'
                              Height: =72
                              Size: =13
                              Text: ="No releases match your filters."
                              VerticalAlign: =VerticalAlign.Middle
