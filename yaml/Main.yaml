                  - galHeaders:
                      Control: Gallery@2.15.0
                      Variant: VariableHeight
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Height: =Parent.Height
                        Items: |-
                          =Switch(
                              varSelectedState,
                              "Future",
                              Sort(
                                  AddColumns(
                                      GroupBy(
                                          AddColumns(
                                              Filter('Policy Proof Tracker',
                                                  'Planned Publish Date' > DateAdd(Today(), 28, "Days") &&
                                                  (!varShowMyEntries || Owner.Email = User().Email) &&
                                                  (varTypeFilter = "All" || Mid('Document Type'.Value, Find(" ", 'Document Type'.Value)+1) = varTypeFilter) &&
                                                  (varSearchText = "" || Lower(varSearchText) in Lower(Title) || Lower(varSearchText) in Lower(Owner.DisplayName))
                                              ),
                                              PlannedDate, 'Planned Publish Date',
                                              ReleaseDateText, Text('Planned Publish Date', "dddd, dd mmmm yyyy")
                                          ),
                                          PlannedDate, GroupedItems
                                      ),
                                      ItemCount, CountRows(GroupedItems)
                                  ),
                                  PlannedDate, SortOrder.Ascending
                              ),
                              "UnapprovedHistoric",
                              Sort(
                                  AddColumns(
                                      GroupBy(
                                          AddColumns(
                                              Filter('Policy Proof Tracker',
                                                  'Planned Publish Date' < Today() && Published = false &&
                                                  (!varShowMyEntries || Owner.Email = User().Email) &&
                                                  (varTypeFilter = "All" || Mid('Document Type'.Value, Find(" ", 'Document Type'.Value)+1) = varTypeFilter) &&
                                                  (varSearchText = "" || Lower(varSearchText) in Lower(Title) || Lower(varSearchText) in Lower(Owner.DisplayName))
                                              ),
                                              PlannedDate, 'Planned Publish Date',
                                              ReleaseDateText, Text('Planned Publish Date', "dddd, dd mmmm yyyy")
                                          ),
                                          PlannedDate, GroupedItems
                                      ),
                                      ItemCount, CountRows(GroupedItems)
                                  ),
                                  PlannedDate, SortOrder.Descending
                              ),
                              Sort(
                                  AddColumns(
                                      GroupBy(
                                          AddColumns(
                                              Filter('Policy Proof Tracker',
                                                  'Planned Publish Date' >= Today() && 'Planned Publish Date' <= DateAdd(Today(), 28, "Days") &&
                                                  (!varShowMyEntries || Owner.Email = User().Email) &&
                                                  (varTypeFilter = "All" || Mid('Document Type'.Value, Find(" ", 'Document Type'.Value)+1) = varTypeFilter) &&
                                                  (varSearchText = "" || Lower(varSearchText) in Lower(Title) || Lower(varSearchText) in Lower(Owner.DisplayName))
                                              ),
                                              PlannedDate, 'Planned Publish Date',
                                              ReleaseDateText, Text('Planned Publish Date', "dddd, dd mmmm yyyy")
                                          ),
                                          PlannedDate, GroupedItems
                                      ),
                                      ItemCount, CountRows(GroupedItems)
