ColorFade(Self.BorderColor, 20%)\r\n                        HoverColor: =RGBA(255, 255, 255, 1)\r\n                        HoverFill: =RGBA(9, 60, 44, 1)\r\n                        OnSelect: |-\r\n                          =Set(varDuplicating, true);\r\n                          Set(\r\n                              varNewDuplicate,\r\n                              Patch(\r\n                                  'Policy Proof Tracker',\r\n                                  Defaults('Policy Proof Tracker'),\r\n                                  {\r\n                                      Title: varSelectedRelease.Title,\r\n                                      'Document Type': varSelectedRelease.'Document Type',\r\n                                      'Item summary': varSelectedRelease.'Item summary',\r\n                                      Owner: varSelectedRelease.Owner,\r\n                                      Audience: varSelectedRelease.Audience,\r\n                                      'External consultation details': varSelectedRelease.'External consultation details',\r\n                                      'External consultation required': varSelectedRelease.'External consultation required',\r\n                                      Remarks: varSelectedRelease.Remarks,\r\n                                      'Title for Newsletter': varSelectedRelease.'Title for Newsletter',\r\n                                      'High Priority': varSelectedRelease.'High Priority',\r\n                                      'Reason for High Priority': varSelectedRelease.'Reason for High Priority',\r\n                                      'Top Item': varSelectedRelease.'Top Item',\r\n                                      'Planned Publish Date': dpkDuplicateDate1.Selected.ThursdayDate,\r\n                                      Published: false,\r\n                                      'Published Date': Blank(),\r\n                                      'Approved by Pillar Lead (Ready to Release)': false,\r\n                                      'Approved For Release By': Blank(),\r\n                                      EmailSent: false\r\n                                  }\r\n                              )\r\n                          );\r\n                          Set(varDuplicating, false);\r\n                          If(\r\n                              IsEmpty(Errors('Policy Proof Tracker', varNewDuplicate)),\r\n                              Set(varShowDuplicateModal1, false);\r\n                              ClearCollect(colUnpublishedPolicies, Filter('Policy Proof Tracker', Published = false));\r\n                              Notify(\r\n                                  \"Duplicated to \" & dpkDuplicateDate1.Selected.ThursdayLabel & \". Find it on the main screen.\",\r\n                                  NotificationType.Success\r\n                              ),\r\n                              Notify(\r\n                                  \"Error: \" & First(Errors('Policy Proof Tracker', varNewDuplicate)).Message,\r\n                                  NotificationType.Error\r\n                              )\r\n                          )\r\n                        PressedBorderColor: =Self.Fill\r\n                        PressedColor: =Self.Fill\r\n                        PressedFill: =Self.Color\r\n                        RadiusBottomLeft: =4\r\n                        RadiusBottomRight: =4\r\n                        RadiusTopLeft: =4\r\n                        RadiusTopRight: =4\r\n                        Text: =\"Duplicate\"\r\n                        Width: =140\r\n                        X: =430\r\n                        Y: =238\r\n      - DeleteItemModal1:\r\n          Control: GroupContainer@1.5.0\r\n          Variant: AutoLayout\r\n          Properties:\r\n            Fill: =RGBA(53, 61, 63, 0.84)\r\n            Height: =Parent.Height\r\n            LayoutAlignItems: =LayoutAlignItems.End\r\n            LayoutDirection: =LayoutDirection.Vertical\r\n            PaddingRight: =20\r\n            PaddingTop: =80\r\n            Visible: =locDisplayDeletePopUp1\r\n            Width: =Parent.Width\r\n          Children:\r\n            - conModalData1:\r\n                Control: GroupContainer@1.5.0\r\n                Variant: AutoLayout\r\n                Properties:\r\n                  AlignInContainer: =AlignInContainer.SetByContainer\r\n                  Fill: =RGBA(255, 255, 255, 1)\r\n                  FillPortions: =0\r\n                  Height: =300\r\n                  LayoutDirection: =LayoutDirection.Vertical\r\n                Children:\r\n                  - conHeaderPopUp1:\r\n                      Control: GroupContainer@1.5.0\r\n                      Variant: AutoLayout\r\n                      Properties:\r\n                        DropShadow: =DropShadow.None\r\n                        FillPortions: =0\r\n                        Height: =80\r\n                        LayoutAlignItems: =LayoutAlignItems.Center\r\n                        LayoutDirection: =LayoutDirection.Horizontal\r\n                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween\r\n                        PaddingLeft: =24\r\n                        PaddingRight: =24\r\n                      Children:\r\n                        - txtModalTitle1:\r\n                            Control: Text@0.0.51\r\n                            Properties:\r\n                              AutoHeight: =true\r\n                              FillPortions: =1\r\n                              Size: =24\r\n                              Text: =\"Delete\"\r\n                              Weight: ='TextCanvas.Weight'.Semibold\r\n                        - btnCloseModal1:\r\n                            Control: Button@0.0.45\r\n                            Properties:\r\n                              Appearance: ='ButtonCanvas.Appearance'.Subtle\r\n                              Icon: =\"Dismiss\"\r\n teColor: =RGBA(249, 83, 109, 1)\r\n                              DisplayMode: =If(varDeletingItem, DisplayMode.Disabled, DisplayMode.Edit)\r\n                              OnSelect: |-\r\n                                =Set(varDeletingItem, true);\r\n                                IfError(\r\n                                    Remove('Policy Proof Tracker', varSelectedRelease),\r\n                                    Set(varDeletingItem, false);\r\n                                    UpdateContext({locDisplayDeletePopUp1: false});\r\n                                    Notify(\"Delete failed. The item may still exist. Please check and try again.\", NotificationType.Error),\r\n                                    UpdateContext({locDisplayDeletePopUp1: false});\r\n                                    ClearCollect(colUnpublishedPolicies, Filter('Policy Proof Tracker', Published = false));\r\n                                    Notify(\"Item deleted successfully.\", NotificationType.Success);\r\n                                    Set(varSelectedRelease, Blank());\r\n                                    Set(varDeletingItem, false);\r\n                                    Navigate(Main_1, ScreenTransition.Fade)\r\n                                )\r\n                              Text: =\"Delete\"\r\n";
    const stamp = "v2.5  \u2014  Built 5 Jul 2026  11:20 BST";

    function firstLines() {
      return yaml.split(/\r?\n/).slice(0, 8).join('\n');
    }

    async function copyYAML() {
      const status = document.getElementById('status');
      if (!yaml.startsWith('Screens:\r\n  ') && !yaml.startsWith('Screens:\n  ')) {
        status.textContent = 'Refusing to copy: YAML does not start with Screens:';
        status.className = 'err';
        return;
      }
      if (yaml.includes('\r\n    Control: Screen\r\n') || yaml.includes('\n    Control: Screen\n')) {
        status.textContent = 'Refusing to copy: stale YAML still contains screen-level Control: Screen.';
        status.className = 'err';
        return;
      }
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied ' + stamp + '. First YAML line: ' + yaml.split(/\r?\n/)[0];
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }

    document.getElementById('preview').textContent = 'Clipboard payload preview (' + stamp + ')\n' + firstLines();
  </script>
